<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>叫叫成长 App Demo</title>
    <link rel="icon" href="assets/demo-favicons/app.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/fill/style.css">
    <link rel="stylesheet" href="demo-enhance.css">
    <style>
        @font-face {
            font-family: "JOJO Kaiti";
            src: url("assets/字体/JOJOKaiti-Regular.ttf") format("truetype");
            font-weight: 400;
        }

        @font-face {
            font-family: "Mohr Rounded";
            src: url("assets/字体/MohrRounded-Bold.ttf") format("truetype");
            font-weight: 700;
        }

        * {
            box-sizing: border-box;
        }

        :root {
            --gray-1: #FAFAFA;
            --gray-2: #F5F4F4;
            --gray-3: #E0DFDF;
            --gray-4: #B2B2B2;
            --gray-5: #666666;
            --gray-6: #404040;
            --ink: #2F2A1F;
            --white: #FFFFFF;
            --yellow-1: #FCF9DE;
            --yellow-2: #FCF3BA;
            --yellow-3: #FFEB6B;
            --yellow-4: #FCDA00;
            --yellow-5: #DBAF00;
            --yellow-6: #544300;
            --orange-1: #FFF3EB;
            --orange-2: #FFEBDE;
            --orange-4: #FF9045;
            --orange-6: #6B2D03;
            --blue-1: #EBF9FF;
            --blue-2: #DBF3FF;
            --blue-4: #33BBFF;
            --blue-6: #0C567A;
            --green-1: #EFFAEB;
            --green-2: #D2F7C6;
            --green-4: #5DC43B;
            --green-6: #155200;
            --pink-1: #FFF0F3;
            --pink-2: #FFDBE4;
            --pink-4: #FF7A99;
            --pink-6: #780A23;
            --purple-1: #F9F5FF;
            --purple-2: #F3EBFC;
            --purple-4: #AE84E3;
            --purple-6: #4E2680;
            --cyan-1: #EDFBFC;
            --cyan-4: #00C2D4;
            --red-1: #FFF2F0;
            --red-4: #FF715C;
            --red-6: #781A0C;
            --pro-gray-1: #F5F8FD;
            --pro-gray-2: #E1E8F7;
            --pro-gray-5: #57637C;
            --pro-gray-6: #1F284D;
            --radius-xs: 8px;
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --radius-pill: 999px;
            --shadow-soft: 0 12px 36px rgba(64, 64, 64, .08);
            --shadow-pop: 0 16px 40px rgba(252, 218, 0, .20);
            --motion-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --motion-standard: cubic-bezier(0.22, 1, 0.36, 1);
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            margin: 0;
            font-family: "PingFang SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--gray-6);
            line-height: 1.5;
            letter-spacing: 0;
            background:
                linear-gradient(90deg, rgba(252, 249, 222, .86), rgba(235, 249, 255, .78)),
                var(--pro-gray-1);
        }

        button,
        input {
            font: inherit;
        }

        button {
            border: 0;
            cursor: pointer;
        }

        img {
            display: block;
            max-width: 100%;
        }

        .app-shell {
            position: relative;
            display: flex;
            flex-direction: column;
            width: min(100%, 480px);
            height: 100dvh;
            max-height: 100dvh;
            margin: 0 auto;
            overflow: hidden;
            background: var(--white);
        }

        .app-main {
            flex: 1;
            overflow-y: auto;
            padding: 0 18px 96px;
            scroll-behavior: smooth;
        }

        .app-main.no-tabbar {
            padding-bottom: 28px;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            min-height: 68px;
            margin: 0 -18px;
            padding: 14px 18px 10px;
            background: rgba(255, 255, 255, .94);
            border-bottom: 1px solid rgba(64, 64, 64, .06);
            backdrop-filter: blur(16px);
        }

        .brand-lockup {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .brand-lockup img {
            width: 86px;
            height: auto;
        }

        .brand-lockup strong {
            display: block;
            overflow: hidden;
            color: var(--ink);
            font-size: 18px;
            line-height: 1.2;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .brand-lockup span {
            display: block;
            color: var(--gray-5);
            font-size: 12px;
        }

        .round-icon-button,
        .back-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            min-width: 44px;
            height: 44px;
            border-radius: var(--radius-pill);
            color: var(--gray-6);
            background: var(--gray-1);
            transition: transform 160ms ease, background 160ms ease;
        }

        .round-icon-button img,
        .back-button img {
            width: 22px;
            height: 22px;
            object-fit: contain;
        }

        .round-icon-button:hover,
        .back-button:hover {
            background: var(--yellow-1);
        }

        .round-icon-button:active,
        .back-button:active,
        .primary-action:active,
        .soft-action:active,
        .chip:active,
        .tab-button:active {
            transform: scale(.96);
        }

        .hero-band {
            position: relative;
            min-height: 180px;
            margin: 18px 0 18px;
            padding: 22px;
            overflow: hidden;
            border: 1px solid rgba(219, 175, 0, .20);
            border-radius: var(--radius-xl);
            background:
                linear-gradient(135deg, var(--yellow-1), var(--blue-1) 58%, var(--pink-1)),
                var(--yellow-1);
        }

        .hero-band.profile {
            background:
                linear-gradient(135deg, var(--yellow-1), var(--green-1) 56%, var(--orange-1)),
                var(--yellow-1);
        }

        .hero-copy {
            position: relative;
            z-index: 2;
            max-width: 260px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 30px;
            margin-bottom: 10px;
            padding: 4px 10px;
            border: 1px solid rgba(84, 67, 0, .16);
            border-radius: var(--radius-pill);
            color: var(--yellow-6);
            background: rgba(255, 255, 255, .72);
            font-size: 12px;
            font-weight: 700;
        }

        h1,
        h2,
        h3,
        p {
            margin: 0;
        }

        h1 {
            color: var(--ink);
            font-size: 28px;
            font-weight: 800;
            line-height: 1.18;
        }

        h2 {
            color: var(--ink);
            font-size: 20px;
            line-height: 1.25;
        }

        h3 {
            color: var(--gray-6);
            font-size: 17px;
            line-height: 1.3;
        }

        .subcopy {
            margin-top: 8px;
            color: var(--gray-5);
            font-size: 14px;
        }

        .hero-character {
            position: absolute;
            right: -6px;
            bottom: -10px;
            width: 150px;
            max-height: 168px;
            object-fit: contain;
            transform-origin: bottom center;
            animation: float-soft 2400ms ease-in-out infinite;
        }

        .hero-pill-row,
        .chip-row,
        .segment-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 2px 0 8px;
            scrollbar-width: none;
        }

        .hero-pill-row::-webkit-scrollbar,
        .chip-row::-webkit-scrollbar,
        .segment-row::-webkit-scrollbar {
            display: none;
        }

        .hero-pill-row {
            position: relative;
            z-index: 2;
            margin-top: 18px;
        }

        .data-pill,
        .chip,
        .mini-tag {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 32px;
            white-space: nowrap;
            border-radius: var(--radius-pill);
            font-size: 12px;
            font-weight: 700;
        }

        .data-pill {
            padding: 5px 10px;
            color: var(--gray-6);
            background: rgba(255, 255, 255, .78);
            border: 1px solid rgba(64, 64, 64, .08);
        }

        .chip {
            min-height: 38px;
            padding: 0 14px;
            color: var(--gray-5);
            background: var(--gray-1);
            border: 1px solid var(--gray-2);
            transition: color 160ms ease, background 160ms ease, border-color 160ms ease, transform 160ms ease;
        }

        .chip.is-active {
            color: var(--yellow-6);
            background: var(--yellow-2);
            border-color: var(--yellow-3);
        }

        .section-head {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 16px;
            margin: 24px 0 12px;
        }

        .section-head p {
            color: var(--gray-5);
            font-size: 12px;
            text-align: right;
        }

        .course-list,
        .media-list,
        .feed-list,
        .profile-list,
        .benefit-list {
            display: grid;
            gap: 12px;
        }

        .course-card,
        .content-card,
        .feed-card,
        .progress-card,
        .achievement-card,
        .tool-tile,
        .detail-block {
            border: 1px solid rgba(64, 64, 64, .08);
            border-radius: var(--radius-lg);
            background: var(--white);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .44);
        }

        .course-card,
        .content-card,
        .feed-card,
        .achievement-card,
        .progress-card {
            padding: 14px;
        }

        .course-card {
            display: grid;
            grid-template-columns: 84px minmax(0, 1fr);
            gap: 14px;
            min-height: 142px;
            text-align: left;
            transition: transform 180ms var(--motion-standard), border-color 180ms ease, box-shadow 180ms ease;
        }

        .course-card:hover,
        .content-card:hover,
        .feed-card:hover,
        .achievement-card:hover {
            border-color: rgba(64, 64, 64, .14);
            box-shadow: var(--shadow-soft);
            transform: translateY(-2px);
        }

        .course-art,
        .media-art {
            display: grid;
            place-items: center;
            align-self: stretch;
            min-height: 112px;
            border-radius: var(--radius-md);
        }

        .course-art img {
            width: 62px;
            height: 62px;
            object-fit: contain;
        }

        .course-card.orange .course-art {
            background: var(--orange-1);
        }

        .course-card.pink .course-art {
            background: var(--pink-1);
        }

        .course-card.blue .course-art {
            background: var(--blue-1);
        }

        .course-card.purple .course-art {
            background: var(--purple-1);
        }

        .course-card.green .course-art {
            background: var(--green-1);
        }

        .card-meta {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 7px;
        }

        .mini-tag {
            min-height: 25px;
            padding: 3px 8px;
            color: var(--gray-5);
            background: var(--gray-1);
            border: 1px solid var(--gray-2);
        }

        .mini-tag.yellow {
            color: var(--yellow-6);
            background: var(--yellow-1);
            border-color: var(--yellow-2);
        }

        .mini-tag.orange {
            color: var(--orange-6);
            background: var(--orange-1);
            border-color: var(--orange-2);
        }

        .mini-tag.blue {
            color: var(--blue-6);
            background: var(--blue-1);
            border-color: var(--blue-2);
        }

        .mini-tag.green {
            color: var(--green-6);
            background: var(--green-1);
            border-color: var(--green-2);
        }

        .mini-tag.pink {
            color: var(--pink-6);
            background: var(--pink-1);
            border-color: var(--pink-2);
        }

        .mini-tag.purple {
            color: var(--purple-6);
            background: var(--purple-1);
            border-color: var(--purple-2);
        }

        .card-desc {
            display: -webkit-box;
            overflow: hidden;
            color: var(--gray-5);
            font-size: 13px;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
        }

        .price-row,
        .media-row,
        .feed-actions,
        .profile-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .price-row {
            margin-top: 12px;
        }

        .price {
            color: var(--ink);
            font-family: "Mohr Rounded", "PingFang SC", sans-serif;
            font-size: 20px;
            font-weight: 700;
        }

        .price small {
            color: var(--gray-5);
            font-family: "PingFang SC", sans-serif;
            font-size: 12px;
            font-weight: 500;
        }

        .arrow {
            width: 28px;
            height: 28px;
            border-radius: var(--radius-pill);
            background: var(--yellow-2);
            display: inline-grid;
            place-items: center;
            flex: 0 0 auto;
        }

        .arrow i {
            color: var(--yellow-6);
            font-size: 16px;
        }

        .primary-action,
        .soft-action,
        .ghost-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 44px;
            padding: 0 18px;
            border-radius: var(--radius-pill);
            font-size: 14px;
            font-weight: 800;
            transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
        }

        .primary-action {
            color: var(--yellow-6);
            background: var(--yellow-4);
            box-shadow: var(--shadow-pop);
        }

        .primary-action.confirming {
            animation: jojo-focus-color 2000ms ease-in-out infinite;
            box-shadow: none;
        }

        .soft-action {
            color: var(--gray-6);
            background: var(--gray-1);
            border: 1px solid var(--gray-2);
        }

        .ghost-action {
            color: var(--gray-6);
            background: transparent;
        }

        .primary-action img,
        .soft-action img {
            width: 18px;
            height: 18px;
        }

        .bundle-strip {
            display: grid;
            grid-template-columns: minmax(0, 1.1fr) 112px;
            gap: 12px;
            align-items: center;
            margin-top: 14px;
            padding: 16px;
            border: 1px solid rgba(0, 154, 168, .16);
            border-radius: var(--radius-lg);
            background: var(--cyan-1);
        }

        .bundle-strip img {
            justify-self: center;
            width: 94px;
            max-height: 96px;
            object-fit: contain;
        }

        .bundle-strip p {
            margin-top: 6px;
            color: var(--pro-gray-5);
            font-size: 13px;
        }

        .media-hero {
            margin: 18px 0;
            overflow: hidden;
            border-radius: var(--radius-xl);
            background: var(--pro-gray-6);
            color: var(--white);
        }

        .player-stage {
            position: relative;
            min-height: 220px;
            padding: 20px;
            background:
                linear-gradient(135deg, rgba(47, 42, 31, .70), rgba(31, 40, 77, .88)),
                var(--pro-gray-6);
        }

        .player-character {
            position: absolute;
            right: 16px;
            bottom: 0;
            width: 132px;
            max-height: 154px;
            object-fit: contain;
        }

        .player-copy {
            position: relative;
            z-index: 2;
            max-width: 254px;
        }

        .player-copy h1 {
            color: var(--white);
        }

        .player-copy .subcopy {
            color: rgba(255, 255, 255, .75);
        }

        .player-controls {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 18px;
        }

        .play-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            border-radius: var(--radius-pill);
            background: var(--yellow-4);
            box-shadow: 0 12px 28px rgba(252, 218, 0, .24);
        }

        .play-button img {
            width: 24px;
            height: 24px;
        }

        .progress-line {
            flex: 1;
            height: 8px;
            overflow: hidden;
            border-radius: var(--radius-pill);
            background: rgba(255, 255, 255, .18);
        }

        .progress-line span {
            display: block;
            width: 58%;
            height: 100%;
            border-radius: inherit;
            background: var(--yellow-4);
        }

        .content-card {
            display: grid;
            grid-template-columns: 92px minmax(0, 1fr);
            gap: 14px;
            text-align: left;
            transition: transform 180ms var(--motion-standard), border-color 180ms ease, box-shadow 180ms ease;
        }

        .media-art {
            min-height: 92px;
            background: var(--gray-1);
            overflow: hidden;
        }

        .media-art img {
            width: 78px;
            max-height: 88px;
            object-fit: contain;
        }

        .media-row {
            margin-top: 10px;
        }

        .duration {
            color: var(--gray-5);
            font-family: "Mohr Rounded", "PingFang SC", sans-serif;
            font-size: 13px;
        }

        .teacher-strip {
            display: grid;
            grid-template-columns: 54px minmax(0, 1fr);
            gap: 12px;
            align-items: center;
            margin-top: 14px;
            padding: 12px;
            border-radius: var(--radius-md);
            background: var(--pro-gray-1);
            border: 1px solid var(--pro-gray-2);
        }

        .teacher-strip img {
            width: 54px;
            height: 54px;
            border-radius: var(--radius-pill);
            object-fit: cover;
        }

        .teacher-strip strong {
            display: block;
            color: var(--pro-gray-6);
            font-size: 15px;
        }

        .teacher-strip span {
            display: block;
            color: var(--pro-gray-5);
            font-size: 12px;
        }

        .feed-card {
            text-align: left;
        }

        .feed-author {
            display: grid;
            grid-template-columns: 48px minmax(0, 1fr) auto;
            gap: 10px;
            align-items: center;
            margin-bottom: 12px;
        }

        .feed-author img {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-pill);
            object-fit: cover;
            background: var(--gray-1);
        }

        .feed-author strong {
            display: block;
            font-size: 15px;
        }

        .feed-author span {
            display: block;
            color: var(--gray-5);
            font-size: 12px;
        }

        .feed-media {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 86px;
            gap: 12px;
            align-items: center;
            min-height: 104px;
            margin: 12px 0;
            padding: 14px;
            border-radius: var(--radius-md);
            background: var(--yellow-1);
            border: 1px solid var(--yellow-2);
        }

        .feed-media p {
            color: var(--gray-5);
            font-size: 13px;
        }

        .feed-media img {
            width: 84px;
            max-height: 92px;
            object-fit: contain;
        }

        .reaction-button {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 36px;
            padding: 0 10px;
            border-radius: var(--radius-pill);
            color: var(--gray-5);
            background: var(--gray-1);
            border: 1px solid var(--gray-2);
            font-size: 12px;
            font-weight: 700;
        }

        .reaction-button.is-liked {
            color: var(--pink-6);
            background: var(--pink-1);
            border-color: var(--pink-2);
        }

        .safe-note {
            display: grid;
            grid-template-columns: 42px minmax(0, 1fr);
            gap: 10px;
            align-items: center;
            margin: 16px 0 4px;
            padding: 12px;
            border-radius: var(--radius-md);
            background: var(--green-1);
            border: 1px solid var(--green-2);
        }

        .safe-note img {
            width: 42px;
            height: 42px;
            object-fit: contain;
        }

        .safe-note strong {
            display: block;
            color: var(--green-6);
            font-size: 14px;
        }

        .safe-note span {
            display: block;
            color: var(--gray-5);
            font-size: 12px;
        }

        .profile-summary {
            display: grid;
            grid-template-columns: 92px minmax(0, 1fr);
            gap: 14px;
            align-items: center;
        }

        .avatar-frame {
            position: relative;
            display: grid;
            place-items: center;
            width: 92px;
            height: 92px;
            border-radius: 28px;
            background: var(--white);
            border: 1px solid rgba(64, 64, 64, .08);
        }

        .avatar-frame img {
            width: 72px;
            height: 72px;
            object-fit: contain;
        }

        .level-badge {
            position: absolute;
            right: -6px;
            bottom: -6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 38px;
            min-height: 26px;
            padding: 0 8px;
            border-radius: var(--radius-pill);
            color: var(--yellow-6);
            background: var(--yellow-4);
            border: 2px solid var(--white);
            font-family: "Mohr Rounded", "PingFang SC", sans-serif;
            font-size: 13px;
            font-weight: 700;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            margin-top: 14px;
        }

        .stat-tile {
            min-height: 72px;
            padding: 10px 8px;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, .74);
            border: 1px solid rgba(64, 64, 64, .06);
            text-align: center;
        }

        .stat-tile strong {
            display: block;
            color: var(--ink);
            font-family: "Mohr Rounded", "PingFang SC", sans-serif;
            font-size: 20px;
            line-height: 1.1;
        }

        .stat-tile span {
            display: block;
            margin-top: 5px;
            color: var(--gray-5);
            font-size: 12px;
        }

        .encourage-card {
            display: grid;

        function renderPostDetail(id) {
            const post = posts.find(item => item.id === id) || posts[0];
            const liked = state.liked.has(post.id);

            return `
                ${detailTopbar("作品详情")}
                <article class="feed-card" style="margin-top:18px;">
                    <div class="feed-author">
                        <img src="${post.avatar}" alt="">
                        <span>
                            <strong>${post.name}</strong>
                            <span>${post.age} · ${post.badge}</span>
                        </span>
                        <span class="mini-tag yellow">${post.tag}</span>
                    </div>
                    <p>${post.text}</p>
                    <div class="feed-media">
                        <span>
                            <strong>${post.mediaTitle}</strong>
                            <p>${post.mediaDesc}</p>
                        </span>
                        <img src="${post.art}" alt="">
                    </div>
                    <div class="feed-actions">
                        <button class="reaction-button ${liked ? "is-liked" : ""}" type="button" data-like="${post.id}">
                            <span>${liked ? "已鼓励" : "鼓励一下"}</span>
                            <span>${post.likes + (liked && post.id !== "post-1" ? 1 : 0)}</span>
                        </button>
                        <button class="reaction-button" type="button" data-action="toast:已发送一句具体鼓励">具体鼓励</button>
                    </div>
                </article>
                <section class="detail-block">
                    <h2>指导师反馈</h2>
                    <ul class="detail-list">
                        <li><img src="${icons.check}" alt=""><span>先说发生了什么，再说自己的想法，表达顺序很清楚。</span></li>
                        <li><img src="${icons.message}" alt=""><span>下一次可以补一句“我为什么这样想”。</span></li>
                    </ul>
                </section>
                <section class="safe-note">
                    <img src="${icons.lock}" alt="">
                    <div>
                        <strong>这条作品对家长可见</strong>
                        <span>评论只支持鼓励模板和指导师反馈，保护孩子的表达安全感。</span>
                    </div>
                </section>
            `;
        }

        function renderWardrobe() {
            const selected = outfits.find(item => item.id === state.outfit) || outfits[0];

            return `
                ${detailTopbar("个人装扮")}
                <section class="detail-hero course" style="background: var(--blue-1); border-color: var(--blue-2);">
                    <div>
                        <span class="mini-tag blue">当前形象</span>
                        <h1>${selected.name}</h1>
                        <p class="subcopy">${selected.desc}。装扮只来自学习和作品成就。</p>
                    </div>
                    <img src="${selected.role}" alt="">
                </section>
                <section class="detail-block">
                    <h2>可切换装扮</h2>
                    <div class="outfit-grid">
                        ${outfits.map(outfit => `
                            <button class="outfit-card ${state.outfit === outfit.id ? "is-selected" : ""}" type="button" data-outfit="${outfit.id}">
                                <img src="${outfit.role}" alt="">
                                <strong>${outfit.name}</strong>
                                <span>${outfit.desc}</span>
                            </button>
                        `).join("")}
                    </div>
                </section>
                <section class="detail-block">
                    <h2>下一件可解锁</h2>
                    <ul class="detail-list">
                        <li><img src="${icons.lock}" alt=""><span>完成 3 个表达作品后解锁“故事主持徽章”。</span></li>
                        <li><img src="${icons.bean}" alt=""><span>使用 300 成长豆可兑换新的背景贴纸。</span></li>
                    </ul>
                </section>
            `;
        }

        function renderAchievements() {
            return `
                ${detailTopbar("成就墙")}
                <section class="detail-hero course" style="background: var(--yellow-1); border-color: var(--yellow-2);">
                    <div>
                        <span class="mini-tag yellow">阶段成就</span>
                        <h1>把努力看得见</h1>
                        <p class="subcopy">成就围绕习惯、作品、表达和探索，不用排名给孩子制造压力。</p>
                    </div>
                    <img src="${icons.starRole}" alt="">
                </section>
                <section class="detail-block">
                    <h2>已点亮</h2>
                    <div class="achievement-grid">
                        ${achievements.map(achievementCard).join("")}
                    </div>
                </section>
                <section class="detail-block">
                    <h2>接下来</h2>
                    <div class="timeline">
                        <div class="timeline-item"><strong>15</strong><span><b>表达作品 15 个</b><br>再提交 3 个作品即可点亮。</span></div>
                        <div class="timeline-item"><strong>10</strong><span><b>连续学习 10 天</b><br>保持短课节奏，不需要一次学太久。</span></div>
                    </div>
                </section>
            `;
        }

        function renderCurrent() {
            const app = document.getElementById("app");
            const tabbar = document.getElementById("tabbar");
            let html = "";

            if (state.view) {
                app.classList.add("no-tabbar");
                tabbar.hidden = true;
                if (state.view.type === "course") html = renderCourseDetail(state.view.id);
                if (state.view.type === "media-detail") html = renderMediaDetail(state.view.id);
                if (state.view.type === "post") html = renderPostDetail(state.view.id);
                if (state.view.type === "wardrobe") html = renderWardrobe();
                if (state.view.type === "achievements") html = renderAchievements();
            } else {
                app.classList.remove("no-tabbar");
                tabbar.hidden = false;
                tabbar.innerHTML = tabsHtml();
                if (state.tab === "plaza") html = renderPlaza();
                if (state.tab === "media") html = renderMedia();
                if (state.tab === "community") html = renderCommunity();
                if (state.tab === "profile") html = renderProfile();
            }

            app.innerHTML = html || emptyState();
            app.scrollTop = 0;
        }

        function emptyState() {
            return `
                ${detailTopbar("暂未开放")}
                <div class="empty-state">
                    <img src="${icons.empty}" alt="">
                    <strong>这一页还在准备中</strong>
                    <span>先回到主页面看看其他内容。</span>
                </div>
            `;
        }

        function showToast(message) {
            const root = document.getElementById("toast-root");
            root.innerHTML = `<div class="toast">${message}</div>`;
            clearTimeout(state.toastTimer);
            state.toastTimer = setTimeout(() => {
                root.innerHTML = "";
            }, 1800);
        }

        function handleConfirm(button) {
            const key = button.dataset.confirm;
            if (state.pendingConfirm === key) {
                const message = button.dataset.confirmMessage || "已确认";
                state.pendingConfirm = null;
                renderCurrent();
                showToast(message);
                return;
            }

            state.pendingConfirm = key;
            renderCurrent();
            showToast("再点一次完成确认");
            setTimeout(() => {
                if (state.pendingConfirm === key) {
                    state.pendingConfirm = null;
                    renderCurrent();
                }
            }, 2000);
        }

        document.addEventListener("click", event => {
            const tabButton = event.target.closest("[data-tab]");
            if (tabButton) {
                state.tab = tabButton.dataset.tab;
                state.view = null;
                state.pendingConfirm = null;
                renderCurrent();
                return;
            }

            const subjectButton = event.target.closest("[data-subject]");
            if (subjectButton) {
                state.activeSubject = subjectButton.dataset.subject;
                renderCurrent();
                return;
            }

            const kindButton = event.target.closest("[data-kind]");
            if (kindButton) {
                state.mediaKind = kindButton.dataset.kind;
                renderCurrent();
                return;
            }

            const feedButton = event.target.closest("[data-feed-mode]");
            if (feedButton) {
                state.feedMode = feedButton.dataset.feedMode;
                renderCurrent();
                return;
            }

            const viewButton = event.target.closest("[data-view]");
            if (viewButton) {
                state.view = {
                    type: viewButton.dataset.view,
                    id: viewButton.dataset.id || null
                };
                state.pendingConfirm = null;
                renderCurrent();
                return;
            }

            const likeButton = event.target.closest("[data-like]");
            if (likeButton) {
                const id = likeButton.dataset.like;
                if (state.liked.has(id)) {
                    state.liked.delete(id);
                    showToast("已收回鼓励");
                } else {
                    state.liked.add(id);
                    showToast("已送出鼓励");
                }
                renderCurrent();
                return;
            }

            const outfitButton = event.target.closest("[data-outfit]");
            if (outfitButton) {
                state.outfit = outfitButton.dataset.outfit;
                renderCurrent();
                showToast("装扮已更新");
                return;
            }

            const confirmButton = event.target.closest("[data-confirm]");
            if (confirmButton) {
                handleConfirm(confirmButton);
                return;
            }

            const actionButton = event.target.closest("[data-action]");
            if (actionButton) {
                const action = actionButton.dataset.action;
                if (action === "back") {
                    state.view = null;
                    state.pendingConfirm = null;
                    renderCurrent();
                    return;
                }
                if (action === "share") {
                    showToast("已生成分享卡片");
                    return;
                }
                if (action === "toggle-play") {
                    state.mediaPlaying = !state.mediaPlaying;
                    renderCurrent();
                    showToast(state.mediaPlaying ? "开始播放" : "已暂停");
                    return;
                }
                if (action.startsWith("toast:")) {
                    showToast(action.replace("toast:", ""));
                }
            }
        });

        renderCurrent();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="demo-motion.js"></script>
</body>
</html>
