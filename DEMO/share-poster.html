<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#111827">
    <title>叫叫故事特效相机 Demo</title>
    <link rel="icon" href="../assets/demo-favicons/rednote-book-32.png" type="image/png" sizes="32x32">
    <link rel="shortcut icon" href="../assets/demo-favicons/rednote-book-32.png" type="image/png">
    <link rel="icon" href="../assets/demo-favicons/rednote-book.png" type="image/png" sizes="512x512">
    <link rel="apple-touch-icon" href="../assets/demo-favicons/rednote-book-180.png">
    <link rel="stylesheet" href="../assets/vendor/phosphor-icons/fill/style.css">
    <style>
        @font-face {
            font-family: "Mohr Rounded";
            src: url("../assets/字体/MohrRounded-Bold.ttf") format("truetype");
            font-weight: 700;
        }

        * {
            box-sizing: border-box;
        }

        :root {
            --ink: #2F2A1F;
            --gray-1: #FAFAFA;
            --gray-2: #F5F4F4;
            --gray-5: #666666;
            --gray-6: #404040;
            --yellow: #FCDA00;
            --yellow-soft: #FCF3BA;
            --blue: #33BBFF;
            --pink: #FF7A99;
            --green: #5DC43B;
            --white: #FFFFFF;
            --radius-sm: 12px;
            --radius-md: 18px;
            --radius-lg: 28px;
            --radius-pill: 999px;
            --shadow-soft: 0 18px 46px rgba(31, 40, 77, .16);
            --shadow-pop: 0 24px 70px rgba(252, 218, 0, .32);
            --motion: cubic-bezier(.22, 1, .36, 1);
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            margin: 0;
            overflow: hidden;
            color: var(--gray-6);
            font-family: "PingFang SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            letter-spacing: 0;
            background:
                radial-gradient(circle at 18% 10%, rgba(252, 218, 0, .22), transparent 28%),
                radial-gradient(circle at 82% 20%, rgba(51, 187, 255, .2), transparent 30%),
                linear-gradient(180deg, #0E1726 0%, #182135 42%, #F8FAFC 42%, #FFFFFF 100%);
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        button,
        input {
            font: inherit;
        }

        button {
            border: 0;
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
        }

        img,
        video,
        canvas {
            display: block;
            max-width: 100%;
        }

        @keyframes shell-enter {
            from {
                opacity: 0;
                transform: translateY(14px) scale(.985);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes enter-down {
            from {
                opacity: 0;
                transform: translateY(-12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes card-enter {
            from {
                opacity: 0;
                transform: translateY(24px) rotateX(9deg) scale(.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) rotateX(1.5deg) scale(1);
            }
        }

        @keyframes chip-enter {
            from {
                opacity: 0;
                transform: translateY(12px) scale(.94);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes button-enter {
            from {
                opacity: 0;
                transform: translateY(18px) scale(.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes placeholder-icon {
            0%,
            100% {
                transform: translateY(0) rotate(-3deg);
            }

            50% {
                transform: translateY(-5px) rotate(4deg);
            }
        }

        @keyframes status-pulse {
            0% {
                transform: scale(1);
            }

            42% {
                transform: scale(1.04);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes flash {
            0% {
                opacity: 0;
            }

            20% {
                opacity: .82;
            }

            100% {
                opacity: 0;
            }
        }

        @keyframes sheet-child-enter {
            from {
                opacity: 0;
                transform: translateY(18px) scale(.985);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes loading-pop {
            from {
                transform: scale(.92) rotate(-8deg);
            }

            to {
                transform: scale(1.08) rotate(8deg);
            }
        }

        .demo-shell {
            position: relative;
            display: flex;
            flex-direction: column;
            width: min(100%, 430px);
            min-height: 100dvh;
            max-height: 100dvh;
            margin: 0 auto;
            overflow: hidden;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, .04) 0%, rgba(255, 255, 255, .02) 42%, rgba(255, 255, 255, .96) 42%),
                #0F172A;
            box-shadow: 0 30px 90px rgba(8, 15, 30, .28);
            animation: shell-enter 520ms var(--motion) both;
        }

        .topbar {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: calc(60px + env(safe-area-inset-top, 0px));
            padding: calc(10px + env(safe-area-inset-top, 0px)) 18px 8px;
            color: rgba(255, 255, 255, .92);
        }

        .title-group {
            min-width: 0;
            animation: enter-down 540ms var(--motion) 70ms both;
        }

        .title-group strong {
            display: block;
            font-family: "Mohr Rounded", "PingFang SC", sans-serif;
            font-size: 20px;
            line-height: 1.1;
        }

        .title-group span {
            display: block;
            margin-top: 4px;
            color: rgba(255, 255, 255, .62);
            font-size: 12px;
            line-height: 1.35;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 34px;
            padding: 0 12px;
            border: 1px solid rgba(255, 255, 255, .14);
            border-radius: var(--radius-pill);
            color: rgba(255, 255, 255, .84);
            background: rgba(255, 255, 255, .1);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
            transition: transform 180ms var(--motion), border-color 180ms ease, background 180ms ease;
            animation: enter-down 540ms var(--motion) 130ms both;
            will-change: transform;
        }

        .status-pill.is-updating {
            animation: status-pulse 280ms var(--motion);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: var(--radius-pill);
            background: var(--yellow);
            box-shadow: 0 0 0 4px rgba(252, 218, 0, .2);
        }

        .camera-main {
            display: grid;
            grid-template-rows: minmax(0, 1fr) auto;
            flex: 1;
            min-height: 0;
            padding: 6px 18px calc(16px + env(safe-area-inset-bottom, 0px));
        }

        .stage-wrap {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            min-height: 0;
            padding-top: 14px;
            perspective: 1000px;
        }

        .camera-card {
            position: relative;
            width: min(100%, 360px);
            max-height: calc(100dvh - 214px - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px));
            aspect-ratio: 3 / 4;
            overflow: hidden;
            border-radius: 34px;
            background:
                linear-gradient(160deg, rgba(255, 255, 255, .12), transparent),
                #111827;
            box-shadow: 0 30px 76px rgba(8, 15, 30, .38);
            transform: rotateX(1.5deg);
            transform-origin: center bottom;
            animation: card-enter 700ms var(--motion) 160ms both;
        }

        .camera-card::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, .22);
            border-radius: inherit;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .22);
        }

        #fx-canvas {
            width: 100%;
            height: 100%;
            background: #111827;
        }

        #camera-video,
        #story-bg {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        .placeholder {
            position: absolute;
            inset: 0;
            z-index: 3;
            display: grid;
            place-items: center;
            padding: 28px;
            color: rgba(255, 255, 255, .88);
            text-align: center;
            background:
                linear-gradient(180deg, rgba(8, 15, 30, .16), rgba(8, 15, 30, .42)),
                url("../assets/generated/rednote-story-bg.webp") center / cover;
            transition: opacity 260ms var(--motion), visibility 260ms ease, transform 260ms var(--motion);
        }

        .placeholder.is-hidden {
            opacity: 0;
            visibility: hidden;
            transform: scale(1.035);
        }

        .placeholder-card {
            display: grid;
            gap: 14px;
            width: min(100%, 260px);
            padding: 22px;
            border: 1px solid rgba(255, 255, 255, .22);
            border-radius: 24px;
            background: rgba(15, 23, 42, .46);
            box-shadow: 0 24px 60px rgba(8, 15, 30, .22);
            backdrop-filter: blur(18px) saturate(1.1);
            -webkit-backdrop-filter: blur(18px) saturate(1.1);
            animation: chip-enter 560ms var(--motion) 420ms both;
        }

        .placeholder-card i {
            color: var(--yellow);
            font-size: 38px;
            animation: placeholder-icon 2.6s ease-in-out 760ms infinite;
            transform-origin: center;
        }

        .placeholder-card strong {
            display: block;
            font-size: 18px;
            line-height: 1.2;
        }

        .placeholder-card span {
            display: block;
            color: rgba(255, 255, 255, .72);
            font-size: 13px;
            line-height: 1.45;
        }

        .chips {
            display: flex;
            gap: 8px;
            margin: 14px 0 12px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .chips::-webkit-scrollbar {
            display: none;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 34px;
            padding: 0 11px;
            border: 1px solid rgba(64, 64, 64, .08);
            border-radius: var(--radius-pill);
            color: var(--gray-6);
            background: rgba(255, 255, 255, .88);
            box-shadow: 0 10px 28px rgba(31, 40, 77, .07);
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
            animation: chip-enter 480ms var(--motion) both;
            transition: transform 160ms var(--motion), box-shadow 160ms ease, border-color 160ms ease;
            will-change: transform;
        }

        .chip:nth-child(1) {
            animation-delay: 520ms;
        }

        .chip:nth-child(2) {
            animation-delay: 580ms;
        }

        .chip:nth-child(3) {
            animation-delay: 640ms;
        }

        .chip i {
            font-size: 15px;
        }

        .control-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .action-button {
            position: relative;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 58px;
            border-radius: 20px;
            color: var(--ink);
            font-weight: 700;
            background: var(--yellow);
            box-shadow: var(--shadow-pop);
            transition: transform 160ms var(--motion), box-shadow 160ms ease, background 160ms ease, opacity 160ms ease;
            animation: button-enter 520ms var(--motion) both;
            transform-origin: center;
            will-change: transform;
        }

        .control-row .action-button:nth-child(1) {
            animation-delay: 700ms;
        }

        .control-row .action-button:nth-child(2) {
            animation-delay: 760ms;
        }

        .action-button::after {
            content: "";
            position: absolute;
            inset: -40% -18%;
            background: linear-gradient(110deg, transparent 28%, rgba(255, 255, 255, .42) 48%, transparent 68%);
            opacity: 0;
            transform: translateX(-40%) rotate(8deg);
            transition: opacity 180ms ease, transform 420ms var(--motion);
            pointer-events: none;
        }

        .action-button span,
        .action-button i {
            position: relative;
            z-index: 1;
        }

        .action-button i {
            font-size: 22px;
        }

        .action-button:active,
        .round-button:active {
            transform: scale(.96);
        }

        .action-button:disabled {
            cursor: progress;
            opacity: .72;
            transform: none;
        }

        .action-button.is-loading i {
            animation: loading-pop 520ms ease-in-out infinite alternate;
        }

        .action-button--secondary {
            color: var(--gray-6);
            background: rgba(255, 255, 255, .92);
            border: 1px solid rgba(64, 64, 64, .08);
            box-shadow: 0 12px 30px rgba(31, 40, 77, .08);
        }

        .capture-flash {
            position: absolute;
            inset: 0;
            z-index: 70;
            pointer-events: none;
            background: #FFFFFF;
            opacity: 0;
        }

        .capture-flash.is-active {
            animation: flash 360ms ease-out both;
        }

        .result-sheet {
            position: absolute;
            inset: 0;
            z-index: 40;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            padding: calc(12px + env(safe-area-inset-top, 0px)) 18px calc(18px + env(safe-area-inset-bottom, 0px));
            background:
                radial-gradient(circle at 20% 12%, rgba(252, 218, 0, .24), transparent 28%),
                linear-gradient(180deg, rgba(255, 255, 255, .98), #FFFFFF 64%);
            opacity: 0;
            pointer-events: none;
            transform: translateY(18px) scale(.985);
            transition: opacity 220ms var(--motion), transform 260ms var(--motion);
        }

        .result-sheet.is-open {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0) scale(1);
        }

        .result-sheet.is-closing {
            opacity: 0;
            transform: translateY(18px) scale(.985);
            transition-duration: 180ms;
        }

        .result-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            min-height: 54px;
        }

        .result-head strong {
            color: var(--ink);
            font-size: 20px;
        }

        .result-head span {
            display: block;
            margin-top: 2px;
            color: var(--gray-5);
            font-size: 12px;
        }

        .round-button {
            display: inline-grid;
            place-items: center;
            width: 44px;
            min-width: 44px;
            height: 44px;
            border-radius: var(--radius-pill);
            color: var(--gray-6);
            background: rgba(255, 255, 255, .86);
            border: 1px solid rgba(64, 64, 64, .08);
            box-shadow: 0 10px 24px rgba(31, 40, 77, .09);
            transition: transform 160ms var(--motion), box-shadow 160ms ease, background 160ms ease;
            will-change: transform;
        }

        .round-button i {
            font-size: 20px;
        }

        .result-preview-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
        }

        .result-preview {
            width: min(100%, 350px);
            max-height: calc(100dvh - 212px - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px));
            aspect-ratio: 3 / 4;
            object-fit: cover;
            border-radius: 32px;
            box-shadow: 0 28px 72px rgba(31, 40, 77, .22);
            background: var(--gray-2);
        }

        .result-sheet.is-open .result-head,
        .result-sheet.is-open .result-preview,
        .result-sheet.is-open .result-actions,
        .result-sheet.is-open .share-copy {
            animation: sheet-child-enter 460ms var(--motion) both;
        }

        .result-sheet.is-open .result-head {
            animation-delay: 50ms;
        }

        .result-sheet.is-open .result-preview {
            animation-delay: 110ms;
        }

        .result-sheet.is-open .result-actions {
            animation-delay: 170ms;
        }

        .result-sheet.is-open .share-copy {
            animation-delay: 220ms;
        }

        .result-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding-top: 14px;
        }

        .share-copy {
            min-height: 38px;
            margin: 10px 8px 0;
            color: var(--gray-5);
            font-size: 12px;
            line-height: 1.45;
            text-align: center;
        }

        .toast {
            position: fixed;
            right: max(18px, calc((100vw - 430px) / 2 + 18px));
            bottom: calc(18px + env(safe-area-inset-bottom, 0px));
            left: max(18px, calc((100vw - 430px) / 2 + 18px));
            z-index: 90;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 44px;
            padding: 10px 14px;
            border-radius: var(--radius-pill);
            color: var(--ink);
            font-size: 13px;
            font-weight: 700;
            background: rgba(255, 255, 255, .94);
            border: 1px solid rgba(64, 64, 64, .08);
            box-shadow: var(--shadow-soft);
            opacity: 0;
            pointer-events: none;
            transform: translateY(12px);
            transition: opacity 180ms ease, transform 180ms ease;
        }

        .toast.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        button:focus-visible {
            outline: 3px solid rgba(51, 187, 255, .52);
            outline-offset: 3px;
        }

        @media (hover: hover) {
            .action-button:hover:not(:disabled),
            .round-button:hover {
                transform: translateY(-2px) scale(1.01);
            }

            .action-button:hover:not(:disabled) {
                box-shadow: 0 28px 72px rgba(252, 218, 0, .36);
            }

            .action-button--secondary:hover:not(:disabled),
            .round-button:hover {
                box-shadow: 0 16px 38px rgba(31, 40, 77, .13);
            }

            .action-button:hover:not(:disabled)::after {
                opacity: 1;
                transform: translateX(42%) rotate(8deg);
            }

            .chip:hover {
                transform: translateY(-2px);
                border-color: rgba(51, 187, 255, .28);
                box-shadow: 0 14px 34px rgba(31, 40, 77, .11);
            }

            .status-pill:hover {
                transform: translateY(-1px);
                background: rgba(255, 255, 255, .14);
            }
        }

        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            margin: -1px;
            overflow: hidden;
            clip: rect(0 0 0 0);
            white-space: nowrap;
            border: 0;
        }

        @media (max-height: 740px) {
            .title-group span {
                display: none;
            }

            .camera-card {
                max-height: calc(100dvh - 184px - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px));
            }

            .stage-wrap {
                padding-top: 2px;
            }

            .chips {
                margin: 10px 0;
            }

            .action-button {
                min-height: 52px;
                border-radius: 18px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 1ms !important;
                transition-duration: 1ms !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>
<body>
    <main class="demo-shell">
        <header class="topbar">
            <div class="title-group">
                <strong>故事特效相机</strong>
                <span>月光书塔 · 阅读15分钟 · 正确率98%</span>
            </div>
            <div class="status-pill" id="tracking-status">
                <span class="status-dot" aria-hidden="true"></span>
                <span>待启动</span>
            </div>
        </header>

        <section class="camera-main" aria-label="故事特效相机">
            <div class="stage-wrap">
                <div class="camera-card">
                    <canvas id="fx-canvas" width="720" height="960"></canvas>
                    <video id="camera-video" playsinline muted></video>
                    <img id="story-bg" src="../assets/generated/rednote-story-bg.webp" alt="">
                    <div class="placeholder" id="placeholder">
                        <div class="placeholder-card">
                            <i class="ph-fill ph-video-camera" aria-hidden="true"></i>
                            <div>
                                <strong>点亮今天的故事造型</strong>
                                <span>对准镜头，戴上月光眼镜。</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div>
                <div class="chips" aria-label="特效能力">
                    <span class="chip"><i class="ph-fill ph-eye" aria-hidden="true"></i>眼镜贴纸</span>
                    <span class="chip"><i class="ph-fill ph-magic-wand" aria-hidden="true"></i>霓虹阅读滤镜</span>
                    <span class="chip"><i class="ph-fill ph-mountains" aria-hidden="true"></i>故事背景替换</span>
                </div>
                <div class="control-row">
                    <button class="action-button" type="button" id="start-camera">
                        <i class="ph-fill ph-camera" aria-hidden="true"></i>
                        <span>开始自拍</span>
                    </button>
                    <button class="action-button action-button--secondary" type="button" id="capture-poster">
                        <i class="ph-fill ph-sparkle" aria-hidden="true"></i>
                        <span>生成分享图</span>
                    </button>
                </div>
            </div>
        </section>

        <div class="capture-flash" id="capture-flash" aria-hidden="true"></div>

        <section class="result-sheet" id="result-sheet" aria-label="生成后的分享图" aria-hidden="true">
            <div class="result-head">
                <button class="round-button" type="button" id="close-result" aria-label="返回相机">
                    <i class="ph-fill ph-caret-left" aria-hidden="true"></i>
                </button>
                <div>
                    <strong>故事图已生成</strong>
                    <span>带学习数据和故事场景</span>
                </div>
                <button class="round-button" type="button" id="retake" aria-label="重新拍摄">
                    <i class="ph-fill ph-camera-rotate" aria-hidden="true"></i>
                </button>
            </div>
            <div class="result-preview-wrap">
                <img class="result-preview" id="result-preview" alt="生成后的故事分享图">
            </div>
            <div>
                <div class="result-actions">
                    <button class="action-button action-button--secondary" type="button" id="save-poster">
                        <i class="ph-fill ph-download-simple" aria-hidden="true"></i>
                        <span>保存本地</span>
                    </button>
                    <button class="action-button" type="button" id="share-poster">
                        <i class="ph-fill ph-share-network" aria-hidden="true"></i>
                        <span>分享小红书</span>
                    </button>
                </div>
                <p class="share-copy" id="share-copy"></p>
            </div>
        </section>

        <canvas class="visually-hidden" id="poster-canvas" width="1080" height="1440"></canvas>
        <canvas class="visually-hidden" id="work-canvas"></canvas>
        <canvas class="visually-hidden" id="mask-canvas"></canvas>
        <div class="toast" id="toast" role="status" aria-live="polite"></div>
    </main>

    <script type="module">
        import {
            FaceLandmarker,
            FilesetResolver,
            ImageSegmenter
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22-rc.20250304";

        const story = {
            title: "《月光书塔》",
            minutes: 15,
            accuracy: 98,
            quiz: "答对 12 / 12",
            text: "今天读了《月光书塔》15分钟，答题正确率98%。#叫叫阅读 #亲子共读 #小红书成长记录"
        };

        const state = {
            stream: null,
            cameraReady: false,
            visionReady: false,
            segmenterReady: false,
            faceLandmarker: null,
            imageSegmenter: null,
            faceLandmarks: null,
            resultUrl: "",
            resultBlob: null,
            lastFaceTs: 0,
            animationId: 0,
            filterIndex: 0,
            modeText: "待启动"
        };

        const filters = [
            {
                name: "霓虹阅读",
                canvas: "contrast(1.12) saturate(1.32) hue-rotate(-8deg)",
                tint: ["rgba(51, 187, 255, .18)", "rgba(252, 218, 0, .16)"]
            },
            {
                name: "月光冷调",
                canvas: "contrast(1.08) saturate(1.12) brightness(1.04) hue-rotate(16deg)",
                tint: ["rgba(174, 132, 227, .2)", "rgba(51, 187, 255, .16)"]
            }
        ];

        const nodes = {
            fxCanvas: document.getElementById("fx-canvas"),
            video: document.getElementById("camera-video"),
            storyBg: document.getElementById("story-bg"),
            placeholder: document.getElementById("placeholder"),
            status: document.getElementById("tracking-status"),
            start: document.getElementById("start-camera"),
            capture: document.getElementById("capture-poster"),
            posterCanvas: document.getElementById("poster-canvas"),
            workCanvas: document.getElementById("work-canvas"),
            maskCanvas: document.getElementById("mask-canvas"),
            resultSheet: document.getElementById("result-sheet"),
            resultPreview: document.getElementById("result-preview"),
            closeResult: document.getElementById("close-result"),
            retake: document.getElementById("retake"),
            save: document.getElementById("save-poster"),
            share: document.getElementById("share-poster"),
            shareCopy: document.getElementById("share-copy"),
            captureFlash: document.getElementById("capture-flash"),
            toast: document.getElementById("toast")
        };

        const fx = nodes.fxCanvas.getContext("2d");
        const posterCtx = nodes.posterCanvas.getContext("2d");

        function setStatus(text) {
            state.modeText = text;
            nodes.status.querySelector("span:last-child").textContent = text;
            nodes.status.classList.remove("is-updating");
            void nodes.status.offsetWidth;
            nodes.status.classList.add("is-updating");
        }

        function showToast(message, icon = "ph-check-circle") {
            nodes.toast.innerHTML = `<i class="ph-fill ${icon}" aria-hidden="true"></i><span>${message}</span>`;
            nodes.toast.classList.add("is-visible");
            clearTimeout(showToast.timer);
            showToast.timer = setTimeout(() => nodes.toast.classList.remove("is-visible"), 2300);
        }

        function triggerFlash() {
            nodes.captureFlash.classList.remove("is-active");
            void nodes.captureFlash.offsetWidth;
            nodes.captureFlash.classList.add("is-active");
        }

        function setCaptureBusy(isBusy) {
            nodes.capture.disabled = isBusy;
            nodes.capture.classList.toggle("is-loading", isBusy);
            nodes.capture.querySelector("span").textContent = isBusy ? "生成中" : "生成分享图";
        }

        function coverRect(sourceWidth, sourceHeight, targetWidth, targetHeight) {
            const sourceRatio = sourceWidth / sourceHeight;
            const targetRatio = targetWidth / targetHeight;
            if (sourceRatio > targetRatio) {
                const width = sourceHeight * targetRatio;
                return { sx: (sourceWidth - width) / 2, sy: 0, sw: width, sh: sourceHeight };
            }
            const height = sourceWidth / targetRatio;
            return { sx: 0, sy: (sourceHeight - height) / 2, sw: sourceWidth, sh: height };
        }

        function drawCover(ctx, source, width, height, mirror = false) {
            const naturalWidth = source.videoWidth || source.naturalWidth || source.width;
            const naturalHeight = source.videoHeight || source.naturalHeight || source.height;
            if (!naturalWidth || !naturalHeight) return;
            const rect = coverRect(naturalWidth, naturalHeight, width, height);
            ctx.save();
            if (mirror) {
                ctx.translate(width, 0);
                ctx.scale(-1, 1);
            }
            ctx.drawImage(source, rect.sx, rect.sy, rect.sw, rect.sh, 0, 0, width, height);
            ctx.restore();
        }

        function drawStoryBase(ctx, width, height) {
            ctx.save();
            drawCover(ctx, nodes.storyBg, width, height, false);
            const haze = ctx.createLinearGradient(0, 0, width, height);
            haze.addColorStop(0, "rgba(5, 11, 28, .18)");
            haze.addColorStop(.45, "rgba(24, 118, 172, .04)");
            haze.addColorStop(1, "rgba(252, 218, 0, .16)");
            ctx.fillStyle = haze;
            ctx.fillRect(0, 0, width, height);
            ctx.restore();
        }

        function drawVideoLayer(ctx, width, height, alpha = .86) {
            if (!state.cameraReady) return;
            const filter = filters[state.filterIndex];
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.filter = filter.canvas;
            drawCover(ctx, nodes.video, width, height, true);
            ctx.restore();
        }

        function drawAtmosphere(ctx, width, height) {
            const filter = filters[state.filterIndex];
            ctx.save();
            ctx.globalCompositeOperation = "screen";
            const glow = ctx.createRadialGradient(width * .28, height * .18, 20, width * .28, height * .18, width * .7);
            glow.addColorStop(0, filter.tint[0]);
            glow.addColorStop(1, "rgba(255, 255, 255, 0)");
            ctx.fillStyle = glow;
            ctx.fillRect(0, 0, width, height);
            const low = ctx.createLinearGradient(0, height * .55, width, height);
            low.addColorStop(0, "rgba(252, 218, 0, .12)");
            low.addColorStop(1, filter.tint[1]);
            ctx.fillStyle = low;
            ctx.fillRect(0, 0, width, height);
            ctx.restore();

            ctx.save();
            ctx.globalAlpha = .22;
            ctx.fillStyle = "#FFFFFF";
            for (let i = 0; i < 20; i += 1) {
                const x = (Math.sin(i * 5.31) * .5 + .5) * width;
                const y = (Math.cos(i * 3.77) * .5 + .5) * height * .62;
                const r = 1.8 + (i % 4);
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        function drawDataPanel(ctx, width, height) {
            const pad = width * .055;
            const panelWidth = width * .56;
            const panelHeight = height * .17;
            ctx.save();
            ctx.translate(pad, pad);
            roundedRect(ctx, 0, 0, panelWidth, panelHeight, 26);
            ctx.fillStyle = "rgba(255, 255, 255, .84)";
            ctx.fill();
            ctx.strokeStyle = "rgba(255, 255, 255, .58)";
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.fillStyle = "#2F2A1F";
            ctx.font = `700 ${Math.round(width * .043)}px "PingFang SC", sans-serif`;
            ctx.fillText(`今天阅读 ${story.minutes} 分钟`, 22, 42);
            ctx.font = `600 ${Math.round(width * .031)}px "PingFang SC", sans-serif`;
            ctx.fillStyle = "rgba(64,64,64,.72)";
            ctx.fillText(story.title, 22, 78);
            ctx.fillText(`正确率 ${story.accuracy}%`, 22, 112);
            ctx.fillStyle = "#33BBFF";
            roundedRect(ctx, 22, 126, panelWidth - 44, 8, 999);
            ctx.fill();
            ctx.fillStyle = "#FCDA00";
            roundedRect(ctx, 22, 126, (panelWidth - 44) * .98, 8, 999);
            ctx.fill();
            ctx.restore();
        }

        function roundedRect(ctx, x, y, width, height, radius) {
            const r = Math.min(radius, width / 2, height / 2);
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + width, y, x + width, y + height, r);
            ctx.arcTo(x + width, y + height, x, y + height, r);
            ctx.arcTo(x, y + height, x, y, r);
            ctx.arcTo(x, y, x + width, y, r);
            ctx.closePath();
        }

        function projectPoint(point, width, height) {
            return {
                x: (1 - point.x) * width,
                y: point.y * height
            };
        }

        function getGlassesPose(width, height) {
            const landmarks = state.faceLandmarks;
            if (!landmarks || !landmarks[33] || !landmarks[263]) {
                return {
                    x: width * .5,
                    y: height * .36,
                    width: width * .42,
                    angle: 0,
                    locked: false
                };
            }
            const leftOuter = projectPoint(landmarks[263], width, height);
            const rightOuter = projectPoint(landmarks[33], width, height);
            const center = {
                x: (leftOuter.x + rightOuter.x) / 2,
                y: (leftOuter.y + rightOuter.y) / 2
            };
            const dx = rightOuter.x - leftOuter.x;
            const dy = rightOuter.y - leftOuter.y;
            return {
                x: center.x,
                y: center.y + Math.hypot(dx, dy) * .03,
                width: Math.hypot(dx, dy) * 1.35,
                angle: Math.atan2(dy, dx),
                locked: true
            };
        }

        function drawGlasses(ctx, width, height) {
            const pose = getGlassesPose(width, height);
            const lensW = pose.width * .34;
            const lensH = lensW * .68;
            const bridge = pose.width * .18;
            ctx.save();
            ctx.translate(pose.x, pose.y);
            ctx.rotate(pose.angle);
            ctx.lineWidth = Math.max(7, pose.width * .04);
            ctx.strokeStyle = pose.locked ? "rgba(47, 42, 31, .86)" : "rgba(47, 42, 31, .5)";
            ctx.fillStyle = pose.locked ? "rgba(51, 187, 255, .2)" : "rgba(255,255,255,.16)";
            ctx.shadowColor = "rgba(252, 218, 0, .38)";
            ctx.shadowBlur = pose.locked ? 18 : 6;
            roundedRect(ctx, -bridge / 2 - lensW, -lensH / 2, lensW, lensH, lensH * .32);
            ctx.fill();
            ctx.stroke();
            roundedRect(ctx, bridge / 2, -lensH / 2, lensW, lensH, lensH * .32);
            ctx.fill();
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(-bridge / 2, -lensH * .04);
            ctx.quadraticCurveTo(0, -lensH * .18, bridge / 2, -lensH * .04);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(-bridge / 2 - lensW, -lensH * .08);
            ctx.lineTo(-bridge / 2 - lensW - pose.width * .18, -lensH * .26);
            ctx.moveTo(bridge / 2 + lensW, -lensH * .08);
            ctx.lineTo(bridge / 2 + lensW + pose.width * .18, -lensH * .26);
            ctx.stroke();
            ctx.restore();
        }

        function drawPosterFrame(ctx, width, height) {
            ctx.save();
            ctx.strokeStyle = "rgba(255, 255, 255, .82)";
            ctx.lineWidth = 6;
            roundedRect(ctx, 28, 28, width - 56, height - 56, 54);
            ctx.stroke();
            ctx.strokeStyle = "rgba(252, 218, 0, .78)";
            ctx.lineWidth = 12;
            roundedRect(ctx, 52, 52, width - 104, height - 104, 44);
            ctx.stroke();
            ctx.fillStyle = "rgba(255,255,255,.86)";
            roundedRect(ctx, width - 270, height - 122, 206, 56, 999);
            ctx.fill();
            ctx.fillStyle = "#2F2A1F";
            ctx.font = `700 ${Math.round(width * .033)}px "PingFang SC", sans-serif`;
            ctx.textAlign = "center";
            ctx.fillText(story.quiz, width - 167, height - 85);
            ctx.restore();
        }

        function renderPreview(now = performance.now()) {
            const width = nodes.fxCanvas.width;
            const height = nodes.fxCanvas.height;
            fx.clearRect(0, 0, width, height);
            drawStoryBase(fx, width, height);
            drawVideoLayer(fx, width, height, state.cameraReady ? .9 : 0);
            runFaceTracking(now);
            drawAtmosphere(fx, width, height);
            drawDataPanel(fx, width, height);
            drawGlasses(fx, width, height);
            drawPosterFrame(fx, width, height);
            state.animationId = requestAnimationFrame(renderPreview);
        }

        function runFaceTracking(now) {
            if (!state.faceLandmarker || !state.cameraReady) return;
            if (now - state.lastFaceTs < 84) return;
            state.lastFaceTs = now;
            try {
                const result = state.faceLandmarker.detectForVideo(nodes.video, now);
                state.faceLandmarks = result.faceLandmarks && result.faceLandmarks[0] ? result.faceLandmarks[0] : null;
                setStatus(state.faceLandmarks ? "眼镜已锁定" : "找脸中");
            } catch (error) {
                state.faceLandmarks = null;
            }
        }

        function delay(ms) {
            return new Promise((resolve) => setTimeout(resolve, ms));
        }

        function waitForVideoReady(video) {
            if (video.videoWidth && video.videoHeight) return Promise.resolve();
            return new Promise((resolve) => {
                let settled = false;
                const cleanup = () => {
                    clearTimeout(timer);
                    video.removeEventListener("loadedmetadata", done);
                    video.removeEventListener("canplay", done);
                    video.removeEventListener("resize", done);
                };
                const finish = () => {
                    if (settled) return;
                    settled = true;
                    cleanup();
                    resolve();
                };
                const done = () => {
                    if (video.videoWidth && video.videoHeight) finish();
                };
                const timer = setTimeout(finish, 2400);
                video.addEventListener("loadedmetadata", done);
                video.addEventListener("canplay", done);
                video.addEventListener("resize", done);
            });
        }

        async function playVideo(video) {
            const playPromise = video.play();
            if (!playPromise || typeof playPromise.catch !== "function") return;
            let playError = null;
            await Promise.race([
                playPromise.catch((error) => {
                    playError = error;
                }),
                delay(1800)
            ]);
            if (playError) throw playError;
        }

        async function loadVision() {
            if (state.visionReady) return;
            setStatus("加载特效");
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22-rc.20250304/wasm"
            );
            state.faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numFaces: 1
            });
            state.vision = vision;
            state.visionReady = true;
        }

        async function loadSegmenter() {
            if (state.segmenterReady) return;
            if (!state.vision) {
                state.vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22-rc.20250304/wasm"
                );
            }
            state.imageSegmenter = await ImageSegmenter.createFromOptions(state.vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_segmenter_landscape/float16/latest/selfie_segmenter_landscape.tflite",
                    delegate: "CPU"
                },
                runningMode: "IMAGE",
                outputCategoryMask: true,
                outputConfidenceMasks: true
            });
            state.segmenterReady = true;
        }

        async function startCamera() {
            try {
                nodes.start.disabled = true;
                nodes.start.querySelector("span").textContent = "启动中";
                setStatus("请求相机");
                stopStream();
                state.stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: "user",
                        width: { ideal: 720 },
                        height: { ideal: 960 }
                    },
                    audio: false
                });
                nodes.video.srcObject = state.stream;
                await playVideo(nodes.video);
                await waitForVideoReady(nodes.video);
                if (!nodes.video.videoWidth || !nodes.video.videoHeight) {
                    setStatus("画面加载中");
                    nodes.start.disabled = false;
                    nodes.start.querySelector("span").textContent = "重新打开";
                    showToast("相机画面还在准备", "ph-info");
                    return;
                }
                state.cameraReady = true;
                nodes.placeholder.classList.add("is-hidden");
                nodes.start.querySelector("span").textContent = "换滤镜";
                nodes.start.disabled = false;
                showToast("前置摄像头已打开");
                await loadVision().catch((error) => {
                    console.warn(error);
                    setStatus("基础滤镜");
                    showToast("脸部追踪加载慢，先用基础滤镜", "ph-info");
                });
                loadSegmenter().catch((error) => {
                    console.warn(error);
                });
            } catch (error) {
                console.warn(error);
                nodes.start.disabled = false;
                nodes.start.querySelector("span").textContent = "重新打开";
                setStatus("相机不可用");
                showToast("请允许摄像头权限后再试", "ph-warning");
            }
        }

        function stopStream() {
            if (!state.stream) return;
            state.stream.getTracks().forEach((track) => track.stop());
            state.stream = null;
            nodes.video.srcObject = null;
            state.cameraReady = false;
        }

        function drawCurrentVideoTo(canvas, width, height) {
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, width, height);
            ctx.filter = filters[state.filterIndex].canvas;
            drawCover(ctx, nodes.video, width, height, true);
            ctx.filter = "none";
            return canvas;
        }

        function dominantEdgeClass(mask, width, height) {
            const counts = new Map();
            const sample = (x, y) => {
                const value = mask[y * width + x];
                counts.set(value, (counts.get(value) || 0) + 1);
            };
            for (let x = 0; x < width; x += 2) {
                sample(x, 0);
                sample(x, height - 1);
            }
            for (let y = 0; y < height; y += 2) {
                sample(0, y);
                sample(width - 1, y);
            }
            return Array.from(counts.entries()).sort((a, b) => b[1] - a[1])[0]?.[0] || 0;
        }

        function buildSoftMaskFromConfidence(result, targetWidth, targetHeight) {
            const masks = result.confidenceMasks || [];
            if (!masks.length) return null;
            const selectedMask = masks.length > 1 ? masks[1] : masks[0];
            const mask = selectedMask.getAsFloat32Array();
            const maskW = selectedMask.width;
            const maskH = selectedMask.height;
            if (!mask || !maskW || !maskH) return null;

            let edgeSum = 0;
            let edgeCount = 0;
            const addEdge = (x, y) => {
                edgeSum += mask[y * maskW + x];
                edgeCount += 1;
            };
            for (let x = 0; x < maskW; x += 4) {
                addEdge(x, 0);
                addEdge(x, maskH - 1);
            }
            for (let y = 0; y < maskH; y += 4) {
                addEdge(0, y);
                addEdge(maskW - 1, y);
            }
            const shouldInvert = edgeCount ? edgeSum / edgeCount > .5 : false;
            const maskCanvas = nodes.maskCanvas;
            maskCanvas.width = maskW;
            maskCanvas.height = maskH;
            const maskCtx = maskCanvas.getContext("2d");
            const imageData = maskCtx.createImageData(maskW, maskH);
            for (let i = 0; i < mask.length; i += 1) {
                let confidence = shouldInvert ? 1 - mask[i] : mask[i];
                confidence = Math.max(0, Math.min(1, (confidence - .18) / .58));
                confidence = confidence * confidence * (3 - 2 * confidence);
                const p = i * 4;
                imageData.data[p] = 255;
                imageData.data[p + 1] = 255;
                imageData.data[p + 2] = 255;
                imageData.data[p + 3] = Math.round(confidence * 255);
            }
            maskCtx.putImageData(imageData, 0, 0);
            const scaled = document.createElement("canvas");
            scaled.width = targetWidth;
            scaled.height = targetHeight;
            const scaledCtx = scaled.getContext("2d");
            scaledCtx.filter = "blur(3px)";
            scaledCtx.drawImage(maskCanvas, 0, 0, targetWidth, targetHeight);
            scaledCtx.filter = "none";
            return scaled;
        }

        function buildMaskFromCategory(result, targetWidth, targetHeight) {
            if (!result.categoryMask) return null;
            const mask = result.categoryMask.getAsUint8Array();
            const maskW = result.categoryMask.width;
            const maskH = result.categoryMask.height;
            if (!mask || !maskW || !maskH) return null;
            const bgClass = dominantEdgeClass(mask, maskW, maskH);
            const maskCanvas = nodes.maskCanvas;
            maskCanvas.width = maskW;
            maskCanvas.height = maskH;
            const maskCtx = maskCanvas.getContext("2d");
            const imageData = maskCtx.createImageData(maskW, maskH);
            for (let i = 0; i < mask.length; i += 1) {
                const alpha = mask[i] === bgClass ? 0 : 255;
                const p = i * 4;
                imageData.data[p] = 255;
                imageData.data[p + 1] = 255;
                imageData.data[p + 2] = 255;
                imageData.data[p + 3] = alpha;
            }
            maskCtx.putImageData(imageData, 0, 0);
            const scaled = document.createElement("canvas");
            scaled.width = targetWidth;
            scaled.height = targetHeight;
            const scaledCtx = scaled.getContext("2d");
            scaledCtx.filter = "blur(3px)";
            scaledCtx.drawImage(maskCanvas, 0, 0, targetWidth, targetHeight);
            scaledCtx.filter = "none";
            return scaled;
        }

        async function makePersonLayer(sourceCanvas, width, height) {
            if (!state.segmenterReady || !state.imageSegmenter) return sourceCanvas;
            const lowW = 256;
            const lowH = Math.round(lowW * height / width);
            nodes.workCanvas.width = lowW;
            nodes.workCanvas.height = lowH;
            const lowCtx = nodes.workCanvas.getContext("2d");
            lowCtx.clearRect(0, 0, lowW, lowH);
            lowCtx.drawImage(sourceCanvas, 0, 0, lowW, lowH);
            const result = state.imageSegmenter.segment(nodes.workCanvas);
            if (!result) return sourceCanvas;
            const alphaMask = buildSoftMaskFromConfidence(result, width, height) || buildMaskFromCategory(result, width, height);
            if (!alphaMask) return sourceCanvas;
            const personCanvas = document.createElement("canvas");
            personCanvas.width = width;
            personCanvas.height = height;
            const personCtx = personCanvas.getContext("2d");
            personCtx.drawImage(sourceCanvas, 0, 0, width, height);
            personCtx.globalCompositeOperation = "destination-in";
            personCtx.drawImage(alphaMask, 0, 0, width, height);
            personCtx.globalCompositeOperation = "source-over";
            return personCanvas;
        }

        function openResultSheet() {
            nodes.resultSheet.classList.remove("is-closing");
            nodes.resultSheet.classList.add("is-open");
            nodes.resultSheet.setAttribute("aria-hidden", "false");
        }

        function closeResultSheet() {
            if (!nodes.resultSheet.classList.contains("is-open")) return;
            nodes.resultSheet.classList.add("is-closing");
            window.setTimeout(() => {
                nodes.resultSheet.classList.remove("is-open", "is-closing");
                nodes.resultSheet.setAttribute("aria-hidden", "true");
            }, 210);
        }

        async function composePoster() {
            triggerFlash();
            setCaptureBusy(true);
            try {
                const width = nodes.posterCanvas.width;
                const height = nodes.posterCanvas.height;
                posterCtx.clearRect(0, 0, width, height);
                drawStoryBase(posterCtx, width, height);

                if (state.cameraReady && nodes.video.videoWidth) {
                    const source = drawCurrentVideoTo(document.createElement("canvas"), width, height);
                    let personLayer = source;
                    try {
                        await loadSegmenter();
                        personLayer = await makePersonLayer(source, width, height);
                    } catch (error) {
                        console.warn(error);
                        showToast("抠图模型较慢，先保留原相机背景", "ph-info");
                    }
                    posterCtx.save();
                    posterCtx.globalAlpha = state.segmenterReady ? .98 : .84;
                    posterCtx.drawImage(personLayer, 0, 0, width, height);
                    posterCtx.restore();
                }

                drawAtmosphere(posterCtx, width, height);
                drawDataPanel(posterCtx, width, height);
                drawGlasses(posterCtx, width, height);
                drawPosterFrame(posterCtx, width, height);

                const blob = await new Promise((resolve) => nodes.posterCanvas.toBlob(resolve, "image/png", .96));
                if (!blob) {
                    showToast("生成失败，请再试一次", "ph-warning");
                    return;
                }
                if (state.resultUrl) URL.revokeObjectURL(state.resultUrl);
                state.resultBlob = blob;
                state.resultUrl = URL.createObjectURL(blob);
                nodes.resultPreview.src = state.resultUrl;
                nodes.shareCopy.textContent = story.text;
                openResultSheet();
            } finally {
                setCaptureBusy(false);
            }
        }

        function downloadPoster() {
            if (!state.resultUrl) {
                showToast("先生成分享图", "ph-info");
                return;
            }
            const link = document.createElement("a");
            link.href = state.resultUrl;
            link.download = "jojo-rednote-story-camera.png";
            document.body.appendChild(link);
            link.click();
            link.remove();
            showToast("图片已保存");
        }

        async function copyShareText() {
            try {
                await navigator.clipboard.writeText(story.text);
                return true;
            } catch (error) {
                return false;
            }
        }

        async function sharePoster() {
            if (!state.resultBlob) {
                showToast("先生成分享图", "ph-info");
                return;
            }
            const file = new File([state.resultBlob], "jojo-rednote-story-camera.png", { type: "image/png" });
            try {
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({ title: "叫叫阅读故事图", text: story.text, files: [file] });
                    return;
                }
                if (navigator.share) {
                    await navigator.share({ title: "叫叫阅读故事图", text: story.text });
                    await copyShareText();
                    showToast("当前浏览器只分享了文案，图片可保存", "ph-info");
                    return;
                }
                const copied = await copyShareText();
                downloadPoster();
                showToast(copied ? "已复制文案并保存图片" : "已保存图片", "ph-download-simple");
            } catch (error) {
                if (error && error.name === "AbortError") return;
                await copyShareText();
                downloadPoster();
                showToast("分享受限，已保存图片和文案", "ph-warning");
            }
        }

        function bindEvents() {
            nodes.start.addEventListener("click", async () => {
                if (state.cameraReady) {
                    state.filterIndex = (state.filterIndex + 1) % filters.length;
                    showToast(`已切换：${filters[state.filterIndex].name}`, "ph-magic-wand");
                    return;
                }
                await startCamera();
            });
            nodes.capture.addEventListener("click", composePoster);
            nodes.closeResult.addEventListener("click", closeResultSheet);
            nodes.retake.addEventListener("click", closeResultSheet);
            nodes.save.addEventListener("click", downloadPoster);
            nodes.share.addEventListener("click", sharePoster);
            document.addEventListener("visibilitychange", () => {
                if (document.hidden) stopStream();
            });
        }

        nodes.storyBg.addEventListener("load", () => renderPreview(), { once: true });
        if (nodes.storyBg.complete) renderPreview();
        bindEvents();
    </script>
</body>
</html>
