<!DOCTYPE html>
<html lang="zh-CN" class="index-boot">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOJO Demos</title>
    <link rel="icon" href="../assets/demo-favicons/index.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/fill/style.css">
    <script>
        (function () {
            const modes = ["auto", "light", "dark"];
            let savedMode = "auto";
            try {
                savedMode = localStorage.getItem("jojo-index-color-mode") || "auto";
            } catch (error) {}

            const mode = modes.includes(savedMode) ? savedMode : "auto";
            const systemDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
            const scheme = mode === "dark" || (mode === "auto" && systemDark) ? "dark" : "light";
            document.documentElement.dataset.colorMode = mode;
            document.documentElement.dataset.colorScheme = scheme;
        })();
    </script>
    <style>
        @font-face {
            font-family: "Mohr Rounded";
            src: url("../assets/字体/MohrRounded-Bold.ttf") format("truetype");
            font-weight: 700;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --gray-1: #FAFAFA;
            --gray-2: #F5F4F4;
            --gray-3: #E0DFDF;
            --gray-4: #BFBDBD;
            --gray-5: #666666;
            --gray-6: #404040;
            --ink: #2F2A1F;
            --white: #FFFFFF;
            --yellow-1: #FCF9DE;
            --yellow-2: #FCF3BA;
            --yellow-4: #FCDA00;
            --yellow-6: #544300;
            --orange-4: #FF9045;
            --pink-4: #FF7A99;
            --blue-4: #5AC8FA;
            --pro-blue-4: #528BFF;
            --green-4: #78C562;
            --purple-4: #AE84E3;
            --radius-window: 22px;
            --radius-card: 18px;
            --radius-soft: 14px;
            --radius-tight: 10px;
            --radius-pill: 999px;
            --shadow-soft: 0 22px 60px rgba(31, 40, 77, .12);
            --shadow-pop: 0 28px 80px rgba(31, 40, 77, .2);
            --focus: rgba(82, 139, 255, .42);
            --page-bg:
                linear-gradient(115deg, rgba(252, 218, 0, .22), transparent 28%),
                linear-gradient(245deg, rgba(90, 200, 250, .2), transparent 30%),
                linear-gradient(180deg, #FFFFFF 0%, var(--gray-1) 62%, #F8F8F8 100%);
            --grid-line: rgba(64, 64, 64, .04);
            --ambient-1: rgba(255, 144, 69, .12);
            --ambient-2: rgba(174, 132, 227, .12);
            --line-soft: rgba(64, 64, 64, .08);
            --line-dashed: rgba(64, 64, 64, .14);
            --glass-line: rgba(255, 255, 255, .68);
            --text-strong: rgba(47, 42, 31, .74);
            --text-soft: rgba(64, 64, 64, .72);
            --text-muted: rgba(64, 64, 64, .58);
            --text-faint: rgba(64, 64, 64, .54);
            --glass-soft: rgba(255, 255, 255, .58);
            --glass-card: rgba(255, 255, 255, .34);
            --glass-card-hover: rgba(255, 255, 255, .82);
            --glass-button: rgba(255, 255, 255, .84);
            --glass-button-hover: rgba(255, 255, 255, .78);
            --folder-glass-strong: rgba(255, 255, 255, .86);
            --folder-glass-mid: rgba(255, 255, 255, .42);
            --folder-glass-soft: rgba(255, 255, 255, .16);
            --folder-glass-front: rgba(255, 255, 255, .8);
            --folder-glass-front-soft: rgba(255, 255, 255, .34);
            --folder-glass-front-tint: rgba(255, 255, 255, .1);
            --surface-highlight: rgba(255, 255, 255, .92);
            --surface-highlight-soft: rgba(255, 255, 255, .72);
            --overlay-bg: rgba(250, 250, 250, .64);
            --shadow-rgb: 31, 40, 77;
            --note-ink: #2F2A1F;
            --note-text: rgba(64, 64, 64, .72);
            --note-strong: rgba(47, 42, 31, .74);
            --note-muted: rgba(64, 64, 64, .58);
            --note-faint: rgba(64, 64, 64, .54);
            --note-line: rgba(64, 64, 64, .08);
            --note-line-dashed: rgba(64, 64, 64, .14);
            --note-glass: rgba(255, 255, 255, .34);
            --note-glass-soft: rgba(255, 255, 255, .48);
            --note-glass-hover: rgba(255, 255, 255, .82);
            --note-button: rgba(255, 255, 255, .84);
            --note-highlight: rgba(255, 255, 255, .92);
            --note-highlight-soft: rgba(255, 255, 255, .72);
            color-scheme: light;
        }

        html[data-color-scheme="dark"] {
            --gray-1: #161719;
            --gray-2: #202124;
            --gray-3: #34363A;
            --gray-4: #54565C;
            --gray-5: #B9BBC2;
            --gray-6: #E7E3D8;
            --ink: #FFF2C5;
            --white: #24262A;
            --yellow-1: #3A3215;
            --yellow-2: #5A4A12;
            --yellow-6: #F9D95B;
            --page-bg:
                linear-gradient(115deg, rgba(252, 218, 0, .12), transparent 29%),
                linear-gradient(245deg, rgba(90, 200, 250, .11), transparent 31%),
                linear-gradient(180deg, #111214 0%, #161719 58%, #101113 100%);
            --grid-line: rgba(255, 242, 197, .045);
            --ambient-1: rgba(255, 144, 69, .1);
            --ambient-2: rgba(174, 132, 227, .1);
            --line-soft: rgba(255, 242, 197, .12);
            --line-dashed: rgba(255, 242, 197, .2);
            --glass-line: rgba(255, 242, 197, .16);
            --text-strong: rgba(255, 242, 197, .78);
            --text-soft: rgba(231, 227, 216, .74);
            --text-muted: rgba(231, 227, 216, .58);
            --text-faint: rgba(231, 227, 216, .48);
            --glass-soft: rgba(38, 40, 43, .68);
            --glass-card: rgba(42, 44, 48, .58);
            --glass-card-hover: rgba(55, 57, 62, .82);
            --glass-button: rgba(255, 242, 197, .12);
            --glass-button-hover: rgba(255, 242, 197, .2);
            --folder-glass-strong: rgba(255, 242, 197, .16);
            --folder-glass-mid: rgba(255, 242, 197, .08);
            --folder-glass-soft: rgba(10, 11, 12, .26);
            --folder-glass-front: rgba(255, 242, 197, .14);
            --folder-glass-front-soft: rgba(255, 242, 197, .07);
            --folder-glass-front-tint: rgba(10, 11, 12, .2);
            --surface-highlight: rgba(255, 242, 197, .18);
            --surface-highlight-soft: rgba(255, 242, 197, .12);
            --overlay-bg: rgba(12, 13, 15, .72);
            --shadow-rgb: 0, 0, 0;
            color-scheme: dark;
        }

        html[data-color-scheme="dark"] .halftone-decor {
            opacity: .32;
            filter: saturate(.9) contrast(1.08);
            mix-blend-mode: screen;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            font-family: "PingFang SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            letter-spacing: 0;
            color: var(--gray-6);
            background: var(--page-bg);
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 36px 36px;
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, .76), transparent 74%);
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: .45;
            background:
                radial-gradient(circle at 16% 76%, var(--ambient-1), transparent 22%),
                radial-gradient(circle at 86% 62%, var(--ambient-2), transparent 24%);
        }

        a,
        button {
            font: inherit;
            -webkit-tap-highlight-color: transparent;
        }

        *:focus,
        *:focus-visible {
            outline: none !important;
        }

        .theme-toggle {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 90;
            display: inline-grid;
            place-items: center;
            width: 30px;
            height: 30px;
            border: 1px solid var(--line-soft);
            border-radius: var(--radius-pill);
            color: var(--text-strong);
            background: var(--glass-soft);
            box-shadow: 0 10px 24px rgba(var(--shadow-rgb), .1), inset 0 1px 0 var(--surface-highlight-soft);
            cursor: pointer;
            backdrop-filter: blur(16px) saturate(1.12);
            -webkit-backdrop-filter: blur(16px) saturate(1.12);
            transition: transform 160ms ease, background 160ms ease, color 160ms ease, opacity 160ms ease;
        }

        .theme-toggle:hover {
            color: var(--ink);
            background: var(--glass-card-hover);
            transform: translateY(-1px);
        }

        .theme-toggle:focus-visible {
            box-shadow: 0 0 0 3px var(--focus), 0 10px 24px rgba(var(--shadow-rgb), .12), inset 0 1px 0 var(--surface-highlight-soft);
        }

        .theme-toggle i {
            font-size: 15px;
            line-height: 1;
        }

        .page {
            position: relative;
            z-index: 1;
            width: min(1160px, calc(100% - 40px));
            min-height: 100vh;
            margin: 0 auto;
            padding: 34px 0 56px;
        }

        .halftone-decor {
            position: fixed;
            right: 0;
            bottom: 0;
            z-index: 0;
            width: clamp(390px, 51vw, 780px);
            aspect-ratio: 4 / 3;
            pointer-events: none;
            opacity: .42;
            filter: saturate(.96) contrast(1.04);
            transform: translate(20%, 20%) rotate(-30deg);
            transform-origin: 50% 50%;
            mix-blend-mode: multiply;
        }

        .halftone-decor::before {
            content: "";
            position: absolute;
            inset: -14%;
            border-radius: 42px;
            background:
                radial-gradient(circle at 30% 22%, rgba(252, 218, 0, .16), transparent 36%),
                radial-gradient(circle at 72% 78%, rgba(82, 139, 255, .14), transparent 42%);
            filter: blur(2px);
        }

        .halftone-decor__canvas {
            position: absolute;
            inset: 0;
            overflow: hidden;
            border-radius: 34px;
            transform: translateZ(0);
        }

        .hero-main {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 18px;
            align-items: end;
            margin: 4px 0 34px;
        }

        h1 {
            color: var(--ink);
            font-family: "Mohr Rounded", "PingFang SC", sans-serif;
            font-size: clamp(34px, 6vw, 74px);
            line-height: .96;
            letter-spacing: 0;
        }

        .hero-kicker {
            display: inline-flex;
            align-items: center;
            width: max-content;
            min-height: 30px;
            padding: 4px 11px;
            margin-bottom: 10px;
            border: 1px solid var(--line-soft);
            border-radius: var(--radius-pill);
            color: var(--text-strong);
            background: var(--glass-soft);
            box-shadow: inset 0 1px 0 var(--surface-highlight-soft);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            font-size: 13px;
        }

        .hero-note {
            max-width: 35ch;
            color: var(--text-soft);
            font-size: 15px;
            line-height: 1.65;
            text-align: right;
        }

        .folder-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: clamp(14px, 2.4vw, 24px);
            align-items: start;
        }

        .folder-card {
            position: relative;
            display: grid;
            gap: 12px;
            width: 100%;
            min-width: 0;
            border: 0;
            color: inherit;
            background: transparent;
            cursor: pointer;
            text-align: center;
        }

        .folder-visual {
            position: relative;
            display: grid;
            place-items: end center;
            min-height: clamp(168px, 18vw, 214px);
            isolation: isolate;
            perspective: 780px;
        }

        .folder-back,
        .folder-front,
        .folder-tab {
            position: absolute;
            left: 50%;
            width: min(100%, 198px);
            transform: translateX(-50%);
            border: 1px solid var(--glass-line);
            backdrop-filter: blur(18px) saturate(1.18);
            -webkit-backdrop-filter: blur(18px) saturate(1.18);
        }

        .folder-back {
            bottom: 18px;
            height: 116px;
            border-radius: 22px 22px 24px 24px;
            background:
                linear-gradient(150deg, var(--folder-glass-strong), var(--folder-glass-mid)),
                linear-gradient(135deg, color-mix(in srgb, var(--folder-accent, var(--yellow-4)) 28%, transparent), var(--folder-glass-soft));
            box-shadow:
                inset 0 1px 0 var(--surface-highlight),
                inset 0 -18px 30px var(--surface-highlight-soft),
                0 22px 46px rgba(var(--shadow-rgb), .1);
            transition: transform 420ms cubic-bezier(.2, .72, .18, 1), box-shadow 420ms ease;
        }

        .folder-tab {
            bottom: 124px;
            left: calc(50% - 39px);
            width: 92px;
            height: 42px;
            border-bottom: 0;
            border-radius: 19px 24px 6px 6px;
            background:
                linear-gradient(145deg, var(--folder-glass-strong), var(--folder-glass-mid)),
                linear-gradient(135deg, color-mix(in srgb, var(--folder-accent, var(--yellow-4)) 38%, transparent), transparent);
            transform: translateX(-50%) rotate(-1deg);
            transform-origin: 20% 100%;
            box-shadow: inset 0 1px 0 var(--surface-highlight);
            transition: transform 420ms cubic-bezier(.2, .72, .18, 1);
        }

        .folder-preview {
            position: absolute;
            bottom: 50px;
            left: 50%;
            z-index: 4;
            display: grid;
            place-items: center;
            width: 78px;
            height: 78px;
            padding: 12px;
            border: 4px solid var(--surface-highlight);
            border-radius: 24px;
            background:
                linear-gradient(145deg, rgba(255, 255, 255, .9), rgba(255, 255, 255, .58)),
                color-mix(in srgb, var(--folder-accent, var(--yellow-4)) 16%, transparent);
            box-shadow:
                0 14px 26px rgba(var(--shadow-rgb), .13),
                inset 0 0 0 1px var(--surface-highlight-soft);
            transform: translateX(-50%) rotate(var(--paper-rotate, -4deg));
            transform-origin: 50% 100%;
            transition: transform 420ms cubic-bezier(.2, .72, .18, 1), filter 420ms ease;
        }

        .folder-preview img {
            display: block;
            width: 52px;
            height: 52px;
            object-fit: contain;
        }

        .folder-preview::after {
            content: "";
            position: absolute;
            inset: 2px;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(255, 255, 255, .34), transparent 48%);
            pointer-events: none;
        }

        .folder-front {
            bottom: 18px;
            z-index: 2;
            height: 106px;
            border-radius: 22px 22px 24px 24px;
            background:
                linear-gradient(145deg, var(--folder-glass-front), var(--folder-glass-front-soft)),
                linear-gradient(135deg, color-mix(in srgb, var(--folder-accent, var(--yellow-4)) 24%, transparent), var(--folder-glass-front-tint));
            box-shadow:
                inset 0 1px 0 var(--surface-highlight),
                inset 0 -20px 34px var(--surface-highlight-soft),
                0 18px 38px rgba(var(--shadow-rgb), .11);
            transform-origin: 50% 100%;
            transition: transform 420ms cubic-bezier(.2, .72, .18, 1), box-shadow 420ms ease;
        }

        .folder-front::before {
            content: "";
            position: absolute;
            inset: 1px;
            border-radius: inherit;
            background: linear-gradient(130deg, var(--surface-highlight-soft), transparent 40%);
            pointer-events: none;
        }

        .folder-card:hover .folder-back,
        .folder-card:focus-visible .folder-back {
            transform: translateX(-50%) translateY(-4px) rotateX(4deg);
            box-shadow:
                inset 0 1px 0 var(--surface-highlight),
                inset 0 -18px 30px var(--surface-highlight-soft),
                0 26px 58px rgba(var(--shadow-rgb), .15);
        }

        .folder-card:hover .folder-tab,
        .folder-card:focus-visible .folder-tab {
            transform: translateX(-50%) translateY(-8px) rotate(-7deg);
        }

        .folder-card:hover .folder-front,
        .folder-card:focus-visible .folder-front {
            transform: translateX(-50%) translateY(8px) rotateX(-13deg);
            box-shadow:
                inset 0 1px 0 var(--surface-highlight),
                inset 0 -20px 34px var(--surface-highlight-soft),
                0 24px 56px rgba(var(--shadow-rgb), .15);
        }

        .folder-card:hover .folder-preview,
        .folder-card:focus-visible .folder-preview {
            filter: saturate(1.05);
            transform: translateX(-50%) translateY(-5px) rotate(calc(var(--paper-rotate, -4deg) * .65));
        }

        .folder-title {
            display: grid;
            gap: 5px;
            min-height: 54px;
        }

        .folder-title strong {
            color: var(--ink);
            font-size: 17px;
            line-height: 1.28;
            font-weight: 700;
        }

        .folder-title span {
            color: var(--text-muted);
            font-size: 12px;
            line-height: 1.3;
        }

        .note-layer {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: grid;
            place-items: center;
            padding: 28px;
            background:
                radial-gradient(circle at var(--open-x, 50%) var(--open-y, 50%), var(--surface-highlight-soft), transparent 24%),
                var(--overlay-bg);
            backdrop-filter: blur(18px) saturate(1.08);
            -webkit-backdrop-filter: blur(18px) saturate(1.08);
            opacity: 0;
            pointer-events: none;
            transition: opacity 220ms ease;
        }

        .note-layer.is-open {
            opacity: 1;
            pointer-events: auto;
        }

        .note-stage {
            position: relative;
            width: min(550px, 100%);
            max-height: min(486px, calc(100vh - 56px));
            perspective: 1100px;
            transform-origin: var(--open-x, 50%) var(--open-y, 50%);
        }

        .note-paper {
            --rx: 0deg;
            --ry: 0deg;
            --shadow-x: 0px;
            --tl-x: 0px;
            --tl-y: 0px;
            --tl-z: 0px;
            --tl-o: .18;
            --tr-x: 0px;
            --tr-y: 0px;
            --tr-z: 0px;
            --tr-o: .18;
            --bl-x: 0px;
            --bl-y: 0px;
            --bl-z: 0px;
            --bl-o: .18;
            --br-x: 0px;
            --br-y: 0px;
            --br-z: 0px;
            --br-o: .18;
            position: relative;
            min-height: 346px;
            max-height: min(486px, calc(100vh - 56px));
            overflow: auto;
            padding: clamp(18px, 3.1vw, 29px);
            border: 1px solid rgba(117, 99, 36, .12);
            border-radius: 16px 14px 18px 13px;
            color: var(--note-ink);
            background:
                linear-gradient(92deg, rgba(255, 255, 255, .28), transparent 16%, rgba(255, 255, 255, .2) 84%, transparent),
                repeating-linear-gradient(0deg, transparent 0 31px, rgba(117, 99, 36, .07) 31px 32px),
                var(--note-color, #FFF5B8);
            box-shadow:
                var(--shadow-x) 30px 70px rgba(var(--shadow-rgb), .18),
                0 26px 70px rgba(var(--shadow-rgb), .14),
                inset 0 1px 0 rgba(255, 255, 255, .56);
            transform:
                rotateX(var(--rx))
                rotateY(var(--ry))
                translateZ(0);
            transform-origin: var(--open-x, 50%) var(--open-y, 50%);
            transform-style: preserve-3d;
            transition: transform 180ms ease, box-shadow 180ms ease;
        }

        .note-layer.is-open .note-paper {
            animation: note-open 520ms cubic-bezier(.16, .82, .24, 1) both;
        }

        .note-layer.is-settled .note-paper {
            animation: none;
        }

        .note-layer.is-closing .note-paper {
            animation: note-close 230ms ease both;
        }

        .note-paper::before {
            content: "";
            position: absolute;
            inset: 13px 14px auto auto;
            width: 56px;
            height: 24px;
            border-radius: 999px;
            background: rgba(255, 255, 255, .38);
            box-shadow: inset 0 0 0 1px rgba(117, 99, 36, .08);
            transform: rotate(8deg) translateZ(30px);
            pointer-events: none;
        }

        .note-paper::after {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 6;
            pointer-events: none;
            opacity: 0;
            background:
                repeating-linear-gradient(0deg, rgba(255, 255, 255, .2) 0 1px, transparent 1px 5px),
                linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, .28) 48%, transparent 100%);
            mix-blend-mode: screen;
        }

        .note-layer.is-open .note-paper::after {
            animation: retro-scan 520ms steps(9, end) both;
        }

        .note-corner {
            position: absolute;
            z-index: 3;
            width: 94px;
            height: 94px;
            pointer-events: none;
            background: linear-gradient(135deg, rgba(255, 255, 255, .62), rgba(255, 255, 255, 0));
            opacity: .25;
            transform-style: preserve-3d;
            transition: opacity 160ms ease, transform 160ms ease;
        }

        .note-corner.tl {
            top: 0;
            left: 0;
            border-radius: 16px 0 0 0;
            opacity: var(--tl-o);
            transform: translate3d(var(--tl-x), var(--tl-y), var(--tl-z)) rotate(-1deg);
        }

        .note-corner.tr {
            top: 0;
            right: 0;
            border-radius: 0 14px 0 0;
            opacity: var(--tr-o);
            transform: translate3d(var(--tr-x), var(--tr-y), var(--tr-z)) rotate(1deg) scaleX(-1);
        }

        .note-corner.bl {
            bottom: 0;
            left: 0;
            border-radius: 0 0 0 13px;
            opacity: var(--bl-o);
            transform: translate3d(var(--bl-x), var(--bl-y), var(--bl-z)) rotate(1deg) scaleY(-1);
        }

        .note-corner.br {
            right: 0;
            bottom: 0;
            border-radius: 0 0 18px 0;
            opacity: var(--br-o);
            transform: translate3d(var(--br-x), var(--br-y), var(--br-z)) rotate(-1deg) scale(-1);
        }

        .note-close {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 7;
            display: inline-grid;
            place-items: center;
            width: 34px;
            height: 34px;
            border: 1px solid var(--note-line);
            border-radius: var(--radius-pill);
            color: var(--note-strong);
            background: var(--note-glass-soft);
            cursor: pointer;
            transition: background 160ms ease, color 160ms ease, transform 160ms ease;
        }

        .note-close:hover {
            color: var(--note-ink);
            background: var(--note-glass-hover);
            transform: translateY(-1px);
        }

        .note-content {
            position: relative;
            z-index: 4;
            display: grid;
            grid-template-columns: 76px minmax(0, 1fr);

            const paperEl = document.getElementById("note-paper");
            const closeButton = layer.querySelector(".note-close");
            const titleEl = document.getElementById("note-title");
            const descEl = document.getElementById("note-desc");
            const iconEl = document.getElementById("note-icon");
            const fileGrid = document.getElementById("file-grid");
            const copyList = document.getElementById("copy-list");
            const toast = document.getElementById("copy-toast");
            const themeToggle = document.getElementById("theme-toggle");
            const systemSchemeQuery = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;
            let colorMode = document.documentElement.dataset.colorMode || "auto";
            let toastTimer = 0;
            let settleTimer = 0;
            let lastFocus = null;

            document.documentElement.classList.remove("index-boot");

            function getColorScheme(mode) {
                return mode === "dark" || (mode === "auto" && systemSchemeQuery && systemSchemeQuery.matches) ? "dark" : "light";
            }

            function applyColorMode(mode, shouldPersist = true) {
                const nextMode = COLOR_MODE_ORDER.includes(mode) ? mode : "auto";
                const meta = COLOR_MODE_META[nextMode];
                colorMode = nextMode;
                document.documentElement.dataset.colorMode = nextMode;
                document.documentElement.dataset.colorScheme = getColorScheme(nextMode);

                if (themeToggle) {
                    const label = `主题：${meta.label}，点击切换`;
                    themeToggle.setAttribute("aria-label", label);
                    themeToggle.title = label;
                    themeToggle.innerHTML = `<i class="ph-fill ${meta.icon}" aria-hidden="true"></i>`;
                }

                if (shouldPersist) {
                    try {
                        localStorage.setItem(COLOR_MODE_KEY, nextMode);
                    } catch (error) {}
                }
            }

            function cycleColorMode() {
                const nextIndex = (COLOR_MODE_ORDER.indexOf(colorMode) + 1) % COLOR_MODE_ORDER.length;
                applyColorMode(COLOR_MODE_ORDER[nextIndex]);
            }

            applyColorMode(colorMode, false);
            if (themeToggle) {
                themeToggle.addEventListener("click", cycleColorMode);
            }

            if (systemSchemeQuery) {
                const syncAutoMode = () => {
                    if (colorMode === "auto") applyColorMode("auto", false);
                };
                if (systemSchemeQuery.addEventListener) {
                    systemSchemeQuery.addEventListener("change", syncAutoMode);
                } else if (systemSchemeQuery.addListener) {
                    systemSchemeQuery.addListener(syncAutoMode);
                }
            }

            function showToast(message) {
                toast.textContent = message;
                toast.classList.add("is-visible");
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => toast.classList.remove("is-visible"), 1600);
            }

            async function copyText(text) {
                try {
                    if (navigator.clipboard && window.isSecureContext) {
                        await navigator.clipboard.writeText(text);
                        return true;
                    }
                } catch (error) {}

                const textarea = document.createElement("textarea");
                textarea.value = text;
                textarea.style.cssText = "position:fixed;opacity:0;pointer-events:none;";
                document.body.appendChild(textarea);
                textarea.select();
                let ok = false;
                try {
                    ok = document.execCommand("copy");
                } catch (error) {
                    ok = false;
                }
                document.body.removeChild(textarea);
                return ok;
            }

            function renderCopies(copies) {
                copyList.innerHTML = "";
                copies.forEach((item) => {
                    const row = document.createElement("div");
                    row.className = "copy-pill";

                    const code = document.createElement("code");
                    code.textContent = item.label;

                    const button = document.createElement("button");
                    button.type = "button";
                    button.setAttribute("aria-label", "复制");
                    button.innerHTML = '<i class="ph-fill ph-copy"></i>';
                    button.addEventListener("click", async () => {
                        const ok = await copyText(item.text);
                        if (ok) {
                            button.classList.add("is-copied");
                            setTimeout(() => button.classList.remove("is-copied"), 1000);
                            showToast(item.label);
                        } else {
                            showToast("复制失败，请手动选择");
                        }
                    });

                    row.append(code, button);
                    copyList.append(row);
                });
            }

            function renderFiles(files) {
                fileGrid.innerHTML = "";

                if (!files.length) {
                    const empty = document.createElement("div");
                    empty.className = "empty-files";
                    empty.textContent = "这个项目只有复制项。";
                    fileGrid.append(empty);
                    return;
                }

                files.forEach((file) => {
                    const link = document.createElement("a");
                    link.className = "file-item";
                    link.href = file.href;
                    link.target = "_blank";
                    link.rel = "noopener noreferrer";
                    link.innerHTML = `
                        <span class="file-icon" aria-hidden="true"><i class="ph-fill ${file.icon || "ph-file"}"></i></span>
                        <span class="file-name">${file.name}</span>
                        <span class="file-meta">${file.meta}</span>
                    `;
                    fileGrid.append(link);
                });
            }

            function setPaperTilt(event) {
                const rect = paperEl.getBoundingClientRect();
                const x = Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width));
                const y = Math.max(0, Math.min(1, (event.clientY - rect.top) / rect.height));
                const liftTl = (1 - x) * (1 - y);
                const liftTr = x * (1 - y);
                const liftBl = (1 - x) * y;
                const liftBr = x * y;

                paperEl.style.setProperty("--rx", `${(0.5 - y) * 8}deg`);
                paperEl.style.setProperty("--ry", `${(x - 0.5) * 10}deg`);
                paperEl.style.setProperty("--shadow-x", `${(0.5 - x) * 16}px`);
                paperEl.style.setProperty("--tl-x", `${liftTl * -8}px`);
                paperEl.style.setProperty("--tl-y", `${liftTl * -10}px`);
                paperEl.style.setProperty("--tl-z", `${liftTl * 42}px`);
                paperEl.style.setProperty("--tl-o", `${0.18 + liftTl * 0.62}`);
                paperEl.style.setProperty("--tr-x", `${liftTr * 8}px`);
                paperEl.style.setProperty("--tr-y", `${liftTr * -10}px`);
                paperEl.style.setProperty("--tr-z", `${liftTr * 42}px`);
                paperEl.style.setProperty("--tr-o", `${0.18 + liftTr * 0.62}`);
                paperEl.style.setProperty("--bl-x", `${liftBl * -8}px`);
                paperEl.style.setProperty("--bl-y", `${liftBl * 10}px`);
                paperEl.style.setProperty("--bl-z", `${liftBl * 42}px`);
                paperEl.style.setProperty("--bl-o", `${0.18 + liftBl * 0.62}`);
                paperEl.style.setProperty("--br-x", `${liftBr * 8}px`);
                paperEl.style.setProperty("--br-y", `${liftBr * 10}px`);
                paperEl.style.setProperty("--br-z", `${liftBr * 42}px`);
                paperEl.style.setProperty("--br-o", `${0.18 + liftBr * 0.62}`);
            }

            function resetPaperTilt() {
                paperEl.style.setProperty("--rx", "0deg");
                paperEl.style.setProperty("--ry", "0deg");
                paperEl.style.setProperty("--shadow-x", "0px");
                ["tl", "tr", "bl", "br"].forEach((corner) => {
                    paperEl.style.setProperty(`--${corner}-x`, "0px");
                    paperEl.style.setProperty(`--${corner}-y`, "0px");
                    paperEl.style.setProperty(`--${corner}-z`, "0px");
                    paperEl.style.setProperty(`--${corner}-o`, ".18");
                });
            }

            function openNote(key, trigger) {
                const project = PROJECTS[key];
                if (!project) return;

                lastFocus = trigger || document.activeElement;
                const rect = trigger ? trigger.getBoundingClientRect() : { left: window.innerWidth / 2, top: window.innerHeight / 2, width: 0, height: 0 };
                const openX = `${rect.left + rect.width / 2}px`;
                const openY = `${rect.top + rect.height / 2}px`;

                layer.style.setProperty("--open-x", openX);
                layer.style.setProperty("--open-y", openY);
                stageEl.style.setProperty("--open-x", openX);
                stageEl.style.setProperty("--open-y", openY);
                paperEl.style.setProperty("--open-x", openX);
                paperEl.style.setProperty("--open-y", openY);
                paperEl.style.setProperty("--note-accent", project.accent);
                paperEl.style.setProperty("--note-color", NOTE_COLORS[Math.floor(Math.random() * NOTE_COLORS.length)]);
                titleEl.textContent = project.title;
                descEl.textContent = project.desc;
                iconEl.src = project.icon;
                iconEl.alt = `${project.title} favicon`;
                renderCopies(project.copies);
                renderFiles(project.files);

                clearTimeout(settleTimer);
                layer.classList.remove("is-closing", "is-settled");
                layer.classList.add("is-open");
                layer.setAttribute("aria-hidden", "false");
                document.body.style.overflow = "hidden";
                resetPaperTilt();
                settleTimer = setTimeout(() => layer.classList.add("is-settled"), 560);
                requestAnimationFrame(() => stageEl.focus({ preventScroll: true }));
            }

            function closeNote() {
                if (!layer.classList.contains("is-open")) return;
                clearTimeout(settleTimer);
                layer.classList.add("is-closing");
                layer.classList.remove("is-open", "is-settled");
                layer.setAttribute("aria-hidden", "true");
                document.body.style.overflow = "";
                setTimeout(() => {
                    layer.classList.remove("is-closing");
                    if (lastFocus && typeof lastFocus.focus === "function") {
                        lastFocus.focus({ preventScroll: true });
                    }
                }, 240);
            }

            document.querySelectorAll(".folder-card").forEach((button) => {
                button.addEventListener("click", () => openNote(button.dataset.project, button));
            });

            paperEl.addEventListener("pointermove", setPaperTilt);
            paperEl.addEventListener("pointerleave", resetPaperTilt);
            closeButton.addEventListener("click", closeNote);
            layer.addEventListener("click", (event) => {
                if (event.target === layer) closeNote();
            });

            document.addEventListener("keydown", (event) => {
                if (event.key === "Escape") closeNote();
            });
        })();
    </script>
</body>
</html>
